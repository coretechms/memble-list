.found-row td{background:#fff5b8!important}.toolbar,.member-table th.header-cell{top:auto!important}

/* 제목행(직책/이름/성별...) 틀고정 */
.table-wrap{
  overflow:auto !important;
  max-height:calc(100vh - 92px) !important;

}
.member-table th.header-cell{
  position:sticky !important;
  top:0 !important;
  z-index:30 !important;
  background:#d9d9d9 !important;
  box-shadow:0 2px 0 #555 !important;
}
.member-table th.header-cell::after{
  content:"";
  position:absolute;
  left:0;
  right:0;
  bottom:-1px;
  border-bottom:1px solid #555;
}

/* 제목행 필터 */
.member-table th.header-cell{padding:2px 3px !important;height:44px !important;min-height:44px !important;vertical-align:top !important;}
.header-filter-wrap{display:flex;flex-direction:column;gap:2px;align-items:stretch;justify-content:center;min-width:42px;}
.header-title{font-weight:700;line-height:16px;text-align:center;white-space:nowrap;pointer-events:none;}

.filter-active .header-title{color:#1737c9;}.filter-active .column-filter{border-color:#1737c9;background:#eef2ff;}

@media print{.table-wrap{max-height:none !important;overflow:visible !important}.member-table th.header-cell{position:static !important;box-shadow:none !important}}

/* 셀 글자 자동완성 */
.autocomplete-box{
  position:fixed;
  display:none;
  z-index:99999;

  min-width:120px;

  border:1px solid #1737c9;
  border-radius:4px;
  box-shadow:0 4px 12px rgba(0,0,0,.18);

}

}

  function lockCellEditing(cell){
    if(!cell || !isEditableBodyCell(cell))return;

  function lockAllCellEditing(exceptCell=null){

  }
  function enableLongPressCellEditing(cell){
    if(blockReadOnlyAction())return;
    if(!isEditableBodyCell(cell))return;
    lockAllCellEditing(cell);
    cell.contentEditable="true";
    cell.classList.add("cell-editing");
    setCurrentSelectedCell(cell);
    setCaretToEnd(cell);

    setStatus("길게 누름: 입력 가능");

  /* 요청 수정: PC Enter / 모바일 키보드 이동 누르면 우측 셀로 이동하고, 숨김 셀은 건너뛰며, 편집 중이면 이동한 셀도 즉시 편집 가능 */
  function isVisibleEditableBodyCell(cell){
    if(!isEditableBodyCell(cell))return false;
    const style=window.getComputedStyle(cell);
    if(style.display==="none" || style.visibility==="hidden")return false;
    const row=cell.parentElement;
    if(!row)return false;
    const rowStyle=window.getComputedStyle(row);
    if(rowStyle.display==="none" || rowStyle.visibility==="hidden")return false;
    const rects=cell.getClientRects();
    if(!rects || !rects.length)return false;
    const rect=cell.getBoundingClientRect();
    return rect.width>0 && rect.height>0;
  }
  function getRightEditableBodyCell(cell){
    if(!isEditableBodyCell(cell))return null;
    const row=cell.parentElement;
    if(!row)return null;
    for(let col=cell.cellIndex+1; col<row.cells.length; col++){
      const next=row.cells[col];
      if(isVisibleEditableBodyCell(next))return next;
    }
    return null;
  }

  function buildFirebasePayload(reason="seed"){
    const data=collectData();
    return {
      type:"member-list-table-data",
      version:"membel-list-realtime-2.0",
      source:"member-list",
      reason,

      totalCount:Number(document.getElementById("totalCount")?.textContent||0),
      updatedAt:Date.now(),

    const normalized=normalizeData(data);
    if(!normalized) return false;

    return normalized.rows.slice(1).some(row=>{
      const cell=row[nameCol];
      return String(cell?.html||cell?.text||cell?.v||"").replace(/<[^>]*>/g,"").trim()!=="";

  function initFirebaseRealtime(){

      if(!window.firebase){
        setRealtimeStatus("Firebase SDK 로딩 실패",false);

        ? firebase.apps[0]

          setRealtimeStatus("실시간 연결 대기중",false);

    let row=findRowByMemberCode(code);

  function rowsArray(){return Array.from(table.tBodies[0]?.rows||[])}

  function isCellObj(c){return c&&typeof c==="object"&&(Object.prototype.hasOwnProperty.call(c,"html")||Object.prototype.hasOwnProperty.call(c,"v")||Object.prototype.hasOwnProperty.call(c,"text"))}
  function normalizeCell(c,rIdx){

  function normalizeData(raw){
    if(!raw) return null;

    // 예전 파일의 1, 2행(총회원수/검색줄)이 저장되어 있으면 자동 제거

    obsoleteIndexes.sort((a,b)=>b-a).forEach(idx=>{

  function restoreDataJsonFile(file){
    if(blockReadOnlyAction())return;
    if(!file)return;
    const reader=new FileReader();
    reader.onload=()=>{
      try{
        const parsed=JSON.parse(String(reader.result||""));
        const raw=parsed&&parsed.data?parsed.data:parsed;
        const data=normalizeData(raw);
        if(!data){alert("복구할 수 있는 회원명부 데이터가 아닙니다.");return;}
        applyData(data);
        setupHeaderFilters();
        saveToAllKeys(collectData());
        document.getElementById("dataRestoreFile").value="";
        pushRealtimeNow("json-restore");
        setStatus("데이터 복구 완료");
      }catch(e){
        alert("JSON 데이터 파일을 읽지 못했습니다.");
      }
    };
    reader.readAsText(file,"utf-8");
  }
  function setCaretToEnd(el){
    try{
      el.focus();
      const range=document.createRange();
      range.selectNodeContents(el);
      range.collapse(false);
      const sel=window.getSelection();
      sel.removeAllRanges();
      sel.addRange(range);
    }catch(e){}
  }
  function hideAutocomplete(){
    autocompleteBox.style.display="none";
    autocompleteBox.innerHTML="";
    autocompleteCell=null;
    autocompleteItems=[];
    autocompleteIndex=-1;
  }
  function getColumnAutocompleteItems(cell,query){
    if(!cell||cell.parentElement.rowIndex<1)return[];
    const col=cell.cellIndex;
    const q=normalize(query);
    if(!q)return[];
    const values=new Map();
    rowsArray().forEach((row,idx)=>{
      if(idx<1||row===cell.parentElement)return;
      const txt=cellText(row.cells[col]);
      if(!txt)return;
      const key=normalize(txt);
      if(!key||key===q)return;
      if(key.startsWith(q)||key.includes(q)) values.set(txt,txt);
    });
    return Array.from(values.values()).sort((a,b)=>String(a).localeCompare(String(b),"ko-KR",{sensitivity:"base",numeric:true})).slice(0,10);
  }
  function renderAutocomplete(){
    autocompleteBox.innerHTML=autocompleteItems.map((v,i)=>`<div class="autocomplete-item ${i===autocompleteIndex?'active':''}" data-index="${i}">${escapeHtml(v)}</div>`).join("");
    autocompleteBox.querySelectorAll(".autocomplete-item").forEach(item=>{
      item.onmousedown=e=>{e.preventDefault(); fillAutocomplete(autocompleteItems[Number(item.dataset.index)]);};
    });
  }
  function showAutocomplete(cell){
    if(!cell||cell.tagName.toLowerCase()!=="td"){hideAutocomplete();return;}
    const q=cellText(cell);
    autocompleteItems=getColumnAutocompleteItems(cell,q);
    if(!autocompleteItems.length){hideAutocomplete();return;}
    autocompleteCell=cell;
    autocompleteIndex=0;
    renderAutocomplete();
    const rect=cell.getBoundingClientRect();
    autocompleteBox.style.left=Math.max(4,rect.left)+"px";
    autocompleteBox.style.top=Math.min(window.innerHeight-180,rect.bottom+2)+"px";
    autocompleteBox.style.minWidth=Math.max(120,rect.width)+"px";
    autocompleteBox.style.display="block";
  }
  function fillAutocomplete(value){
    if(!autocompleteCell||!value)return;
    autocompleteCell.innerText=value;
    setCaretToEnd(autocompleteCell);
    hideAutocomplete();
    updateTotalCount();
    refreshHeaderFiltersSoon();
    autoSave();
    scheduleScaleWholeTable();
  }
  function moveAutocomplete(delta){
    if(autocompleteBox.style.display==="none"||!autocompleteItems.length)return false;
    autocompleteIndex=(autocompleteIndex+delta+autocompleteItems.length)%autocompleteItems.length;
    renderAutocomplete();
    return true;
  }

  table.addEventListener("pointerdown",e=>{
    const c=e.target.closest&&e.target.closest("td,th");
    if(!c)return;
    const isTouchPointer=(e.pointerType==="touch"||e.pointerType==="pen");
    if(!isTouchPointer && (e.ctrlKey || e.metaKey)){
      e.preventDefault();
      e.stopPropagation();
      cancelLongPressTimer();
      cancelTouchSelectTimer();
      toggleMultiSelectedCell(c);

      return;
    }
    touchMovedAsScroll=false;
    longPressStartX=e.clientX||0;
    longPressStartY=e.clientY||0;
    scheduleCellTouchSelection(c,!isTouchPointer);
    if(isTouchPointer) suppressNextTouchClickUntil=Date.now()+CELL_TOUCH_DELAY_MS+120;
    if(!isEditableBodyCell(c)){
      cancelLongPressTimer();
      return;
    }
    lockAllCellEditing(c);
    c.contentEditable="false";
    c.classList.remove("cell-editing");

    /* 요청 수정: PC에서는 길게 누름 편집 금지, 더블클릭으로만 편집 진입 */
    if(!isTouchPointer){
      cancelLongPressTimer();
      return;
    }

    clearTimeout(longPressTimer);
    longPressTimer=setTimeout(()=>{
      if(touchMovedAsScroll)return;
      cancelTouchSelectTimer();
      enableLongPressCellEditing(c);
      longPressTimer=null;
    },LONG_PRESS_EDIT_MS);
  },true);

  /* 요청 수정: PC 모드 글자 편집은 더블클릭으로 진입 */
  table.addEventListener("dblclick",e=>{
    const c=e.target.closest&&e.target.closest("td");
    if(!c || !isEditableBodyCell(c))return;
    if(e.pointerType && (e.pointerType==="touch" || e.pointerType==="pen"))return;
    e.preventDefault();
    e.stopPropagation();
    cancelLongPressTimer();
    cancelTouchSelectTimer();
    enableLongPressCellEditing(c);
  },true);
  table.addEventListener("pointermove",e=>{
    if(!longPressTimer&&!touchSelectTimer)return;
    const dx=Math.abs((e.clientX||0)-longPressStartX);
    const dy=Math.abs((e.clientY||0)-longPressStartY);
    const isTouchPointer=(e.pointerType==="touch"||e.pointerType==="pen");
    if(isTouchPointer && (dx>TOUCH_SCROLL_MOVE_LIMIT || dy>TOUCH_SCROLL_MOVE_LIMIT)){
      touchMovedAsScroll=true;
      suppressNextTouchClickUntil=Date.now()+650;
      cancelLongPressTimer();
      cancelTouchSelectTimer();
      return;
    }
    if(dx>LONG_PRESS_MOVE_LIMIT || dy>LONG_PRESS_MOVE_LIMIT){
      cancelLongPressTimer();
      cancelTouchSelectTimer();
    }
  },true);
  table.addEventListener("pointerup",e=>{
    if(touchMovedAsScroll){
      suppressNextTouchClickUntil=Date.now()+650;
      cancelTouchSelectTimer();
    }
    cancelLongPressTimer();
    touchMovedAsScroll=false;
  },true);
  table.addEventListener("pointercancel",()=>{
    touchMovedAsScroll=false;
    cancelLongPressTimer();
    cancelTouchSelectTimer();
  },true);
  table.addEventListener("contextmenu",e=>{
    const c=e.target.closest&&e.target.closest("#memberTable td");
    if(c){e.preventDefault();}
  },true);

  table.addEventListener("focusin",e=>{
    const c=e.target.closest&&e.target.closest("td,th");
    if(!c)return;
    setCurrentSelectedCell(c);
    if(isEditableBodyCell(c) && c.isContentEditable){
      isCellEditing=true;

    }
  },true);
  table.addEventListener("focusout",e=>{
    const c=e.target.closest&&e.target.closest("td,th");
    if(!c)return;
    setTimeout(()=>{
      const active=document.activeElement;
      const activeCell=active&&active.closest&&active.closest("#memberTable td,#memberTable th");
      if(activeCell){
        setCurrentSelectedCell(activeCell);
      }else{
        clearSelectedCellBorders();
      }
      if(isEditableBodyCell(c))lockCellEditing(c);
    },0);
    finishCellEditingSoon();
  },true);
  table.addEventListener("click",e=>{
    const c=e.target.closest&&e.target.closest("td,th");
    if(!c)return;
    if(e.ctrlKey || e.metaKey){
      e.preventDefault();
      e.stopPropagation();
      return;
    }
    if(Date.now()<suppressNextTouchClickUntil){
      e.preventDefault();
      e.stopPropagation();
      return;
    }
    setCurrentSelectedCell(c);
  });
  table.addEventListener("keydown",e=>{
    const activeCell=e.target&&e.target.closest?e.target.closest("#memberTable td"):null;
    if(e.key==="Enter" && activeCell){
      e.preventDefault();
      e.stopPropagation();
      hideAutocomplete();
      moveRightCellByEnter(activeCell);
      return;
    }
    if(autocompleteBox.style.display!=="none"&&autocompleteItems.length){
      if(e.key==="ArrowDown"){e.preventDefault();moveAutocomplete(1);return;}
      if(e.key==="ArrowUp"){e.preventDefault();moveAutocomplete(-1);return;}
      if(e.key==="Tab"){e.preventDefault();fillAutocomplete(autocompleteItems[autocompleteIndex]);return;}
      if(e.key==="Escape"){hideAutocomplete();return;}
    }
  },true);
  table.addEventListener("input",e=>{
    if(blockReadOnlyAction()) return;
    const c=e.target.closest&&e.target.closest("td,th");
    updateTotalCount();
    refreshHeaderFiltersSoon();
    autoSave();
    scheduleScaleWholeTable();
    if(c)showAutocomplete(c);
  },true);
  table.addEventListener("blur",e=>{const c=e.target.closest&&e.target.closest("td,th"); if(!c)return; setTimeout(()=>{if(!autocompleteBox.matches(":hover"))hideAutocomplete();},120); if(!isReadOnlyMode() && getPhoneColumnIndexes().includes(c.cellIndex)){const old=c.innerText.trim(), next=normalizePhoneText(old); if(old!==next){c.innerText=next;autoSave();scheduleScaleWholeTable()}}},true);
  document.getElementById("sortBtn").onclick=()=>{if(blockReadOnlyAction())return;sortRowsByNameAsc(); search(); autoSave(); pushRealtimeNow("manual-sort"); setStatus("이름 가나다순 정렬 완료");}; document.getElementById("resetBtn").onclick=resetData; document.getElementById("dataBackupBtn").onclick=backupDataJson; document.getElementById("dataRestoreBtn").onclick=()=>{if(blockReadOnlyAction())return;document.getElementById("dataRestoreFile").click();}; document.getElementById("dataRestoreFile").onchange=e=>restoreDataJsonFile(e.target.files&&e.target.files[0]);  document.getElementById("addRowBtn").onclick=addRow; document.getElementById("delRowBtn").onclick=deleteRow; document.getElementById("addColBtn").onclick=addCol; document.getElementById("delColBtn").onclick=deleteCol; document.getElementById("selectRowBtn").onclick=selectCurrentRow;
  document.getElementById("clearSearchBtn").onclick=()=>{document.getElementById("nameSearch").value="";document.getElementById("nickSearch").value="";table.querySelectorAll(".column-filter-check").forEach(check=>{check.checked=true;});table.querySelectorAll("th.header-cell").forEach(th=>{th.dataset.filterActive="0";th.classList.remove("filter-active");const btn=th.querySelector(".column-filter-toggle");if(btn)btn.textContent="전체";});closeAllColumnFilterPanels(); search()};
  bindCellContentButtons();
  bindCellStyleButtons();
  function handleOutsideFilterClose(e){
    if(!autocompleteBox.contains(e.target)&&!e.target.closest("td,th"))hideAutocomplete();
    /* 필터 박스는 확인 버튼을 눌렀을 때만 닫히도록 유지 */
    if(e.target.closest(".header-filter-wrap") || e.target.closest(".multi-filter-panel")) return;
  }
  document.addEventListener("click",handleOutsideFilterClose);
  document.addEventListener("touchstart",handleOutsideFilterClose,{passive:true});
  tableWrap.addEventListener("scroll",()=>{hideAutocomplete();});
  window.addEventListener("resize",()=>{hideAutocomplete();scheduleScaleWholeTable();}); window.addEventListener("orientationchange",()=>setTimeout(scaleWholeTable,300));
  applyData(loadBestSaved()||defaultData());

  initFirebaseRealtime();
  initBusSeatApprovedMemberSync();

  function bindToolbarButtonGroups(){
    const groups = [
      { button: document.getElementById("adminGroupToggleBtn"), panel: document.getElementById("adminButtonGroup") },
      { button: document.getElementById("editGroupToggleBtn"), panel: document.getElementById("editButtonGroup") }
    ];
    groups.forEach(({button, panel})=>{
      if(!button || !panel) return;
      button.addEventListener("click", ()=>{
        if(button.id === "adminGroupToggleBtn" && panel.hasAttribute("hidden")){
          if(typeof window.openAdminGroupWithPassword === "function"){
            window.openAdminGroupWithPassword();
          }else{
            window.dispatchEvent(new CustomEvent("request-admin-group-open"));
          }
          return;
        }
        const willOpen = panel.hasAttribute("hidden");
        groups.forEach(({button: otherButton, panel: otherPanel})=>{
          if(!otherButton || !otherPanel) return;
          otherPanel.setAttribute("hidden", "");
          otherButton.classList.remove("is-open");
          otherButton.setAttribute("aria-expanded", "false");
        });
        if(willOpen){
          panel.removeAttribute("hidden");
          button.classList.add("is-open");
          button.setAttribute("aria-expanded", "true");
        }
      });
    });
  }

  bindToolbarButtonGroups();

})();
</script>

<script>
(function(){
  const PASS_KEY="memberList.admin.passwordHash.v1";
  const RECOVERY_KEY="memberList.admin.recoveryHash.v1";
  const READONLY_KEY="memberList.readonly.passwordHash.v1";
  const SYSTEM_ADMIN_KEY="memberList.systemAdmin.passwordHash.v1";
  const DEFAULT_PASSWORD="1234";
  const DEFAULT_READONLY_PASSWORD="0000";
  const SESSION_KEY="memberList.admin.sessionUnlocked.v1";
  const SESSION_MODE_KEY="memberList.admin.sessionMode.v1";
  const ADMIN_SYNC_PATH="memberList/main/adminPasswordSync";
  const ZOOMABLE_VIEWPORT="width=device-width, initial-scale=1, minimum-scale=0.35, maximum-scale=15, user-scalable=yes, viewport-fit=cover";
  const LOCKED_VIEWPORT="width=device-width, initial-scale=1, minimum-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover";
  const $=(id)=>document.getElementById(id);

  function setViewportLockedForAdmin(isLocked){
    try{
      const viewport=document.querySelector('meta[name="viewport"]');
      if(viewport) viewport.setAttribute("content", isLocked ? LOCKED_VIEWPORT : ZOOMABLE_VIEWPORT);
    }catch(e){}
  }

  let adminDb=null, adminRef=null;
  let adminReady=false, adminRemoteLoaded=false;
  let adminPasswordHash="", adminRecoveryHash="", readOnlyPasswordHash="", systemAdminPasswordHash="";
  let adminWriteTimer=null;

  async function sha256(text){
    if(window.crypto && crypto.subtle){
      const data=new TextEncoder().encode(String(text));
      const hash=await crypto.subtle.digest("SHA-256",data);
      return Array.from(new Uint8Array(hash)).map(b=>b.toString(16).padStart(2,"0")).join("");
    }
    let h=0,s=String(text);
    for(let i=0;i<s.length;i++){h=((h<<5)-h)+s.charCodeAt(i);h|=0;}
    return "fallback-"+String(h);
  }

  function setGateMsg(msg,color="#c00"){
    const el=$("adminGateMsg");
    if(el){el.textContent=msg||"";el.style.color=color;}
  }
  function setRealtimeBoxMsg(msg,isOn){
    const box=$("realtimeStatusBox");
    if(!box)return;
    box.textContent=msg;
    box.classList.toggle("off",!isOn);
  }

  function applyModeButtons(mode){
    const readOnly=mode==="readonly";
    const status=$("statusText");
    if(status) status.textContent=readOnly ? "읽기전용" : "편집 가능";
    document.querySelectorAll("#memberTable td,#memberTable th").forEach(cell=>{
      cell.contentEditable="false";
      cell.classList.remove("cell-editing");
    });
  }

  function setUnlockedState(isUnlocked,mode="edit"){
    const isReadOnly=!!isUnlocked && mode==="readonly";
    setViewportLockedForAdmin(!isUnlocked);
    document.body.classList.toggle("locked",!isUnlocked);
    document.body.classList.toggle("unlocked",!!isUnlocked);
    document.body.classList.toggle("readonly-mode",isReadOnly);
    document.body.classList.toggle("edit-mode",!!isUnlocked && !isReadOnly);
    document.documentElement.classList.toggle("member-refresh-unlocked",!!isUnlocked);
    document.documentElement.classList.toggle("member-refresh-readonly",isReadOnly);
    if(isUnlocked){
      /* PC/모바일 새로고침 유지: 로그인/읽기전용 진입 상태를 저장해 새로고침 후 같은 화면으로 복귀합니다. */
      try{
        localStorage.setItem(SESSION_KEY,"1");
        localStorage.setItem(SESSION_MODE_KEY,isReadOnly?"readonly":"edit");
      }catch(e){}
      applyModeButtons(isReadOnly?"readonly":"edit");
      if(exitGuardReady)setTimeout(pushMemberListStayState,0);
      setTimeout(()=>window.dispatchEvent(new Event("resize")),80);
    }else{
      localStorage.removeItem(SESSION_KEY);
      localStorage.removeItem(SESSION_MODE_KEY);
      document.body.classList.remove("readonly-mode","edit-mode");
      setTimeout(()=>window.scrollTo(0,0),30);
    }
  }

  function forcePasswordGate(){
    localStorage.removeItem(SESSION_KEY);
    localStorage.removeItem(SESSION_MODE_KEY);
    setUnlockedState(false);
  }

  function restoreUnlockedSession(){
    try{
      const saved=localStorage.getItem(SESSION_KEY);
      const mode=localStorage.getItem(SESSION_MODE_KEY)||"edit";
      if(saved==="1"){
        setUnlockedState(true,mode==="readonly"?"readonly":"edit");
        return true;
      }
    }catch(e){}
    setUnlockedState(false);
    return false;
  }

  /* 요청 수정: 새로고침/모바일 뒤로가기에서 현재 회원정보 화면을 벗어나지 않도록 고정 */
  const EXIT_GUARD_STATE_KEY = "memberListStayGuard";
  let exitGuardReady = false;

  function isSessionUnlocked(){
    try{return localStorage.getItem(SESSION_KEY)==="1";}catch(e){return document.body.classList.contains("unlocked");}
  }

  function pushMemberListStayState(){
    try{
      if(!history.state || history.state[EXIT_GUARD_STATE_KEY]!==true){
        history.replaceState(Object.assign({}, history.state||{}, {[EXIT_GUARD_STATE_KEY]:true}), document.title, location.href);
      }
      history.pushState({[EXIT_GUARD_STATE_KEY]:true, memberListLock:"stay"}, document.title, location.href);
    }catch(e){}
  }

  function setupMemberListExitGuard(){
    if(exitGuardReady)return;
    exitGuardReady=true;
    pushMemberListStayState();
    window.addEventListener("popstate",function(){
      /* 뒤로가기는 외부 회원관리/이전 페이지로 나가지 않고 현재 화면을 유지합니다. */
      if(isSessionUnlocked()){
        setTimeout(()=>{
          pushMemberListStayState();
          restoreUnlockedSession();
          window.dispatchEvent(new Event("resize"));
        },0);
      }else{
        setTimeout(()=>{
          pushMemberListStayState();
          setUnlockedState(false);
          resetViewToMinimumForLogin();
          const input=$("adminPasswordInput");
          if(input)input.focus();
        },0);
      }
    });
    window.addEventListener("pageshow",function(){
      pushMemberListStayState();
      if(isSessionUnlocked())restoreUnlockedSession();
    });
  }
  function makeRecoveryCode(){
    const chars="ABCDEFGHJKLMNPQRSTUVWXYZ23456789";
    const part=()=>Array.from({length:4},()=>chars[Math.floor(Math.random()*chars.length)]).join("");
    return [part(),part(),part(),part()].join("-");
  }
  function normalizeAdminPayload(value){
    if(!value)return null;
    if(typeof value==="string")return {passwordHash:value,recoveryHash:"",readOnlyHash:""};
    if(typeof value!=="object")return null;
    const passwordHash=String(value.passwordHash||value.passHash||value.adminPasswordHash||value.hash||"");
    const recoveryHash=String(value.recoveryHash||value.adminRecoveryHash||value.recoveryCodeHash||"");
    const readOnlyHash=String(value.readOnlyHash||value.readonlyHash||value.viewerHash||value.readOnlyPasswordHash||"");
    const systemAdminHash=String(value.systemAdminHash||value.systemPasswordHash||value.systemAdminPasswordHash||"");
    if(!passwordHash)return null;
    return {passwordHash,recoveryHash,readOnlyHash,systemAdminHash};
  }
  async function getDefaultHash(){return await sha256(DEFAULT_PASSWORD);}
  async function getDefaultReadOnlyHash(){return await sha256(DEFAULT_READONLY_PASSWORD);}
  async function loadLocalAdminCache(){
    let pass=localStorage.getItem(PASS_KEY)||"";
    if(!pass){pass=await getDefaultHash();localStorage.setItem(PASS_KEY,pass);}
    adminPasswordHash=pass;
    adminRecoveryHash=localStorage.getItem(RECOVERY_KEY)||"";
    let readOnly=localStorage.getItem(READONLY_KEY)||"";
    if(!readOnly){readOnly=await getDefaultReadOnlyHash();localStorage.setItem(READONLY_KEY,readOnly);}
    readOnlyPasswordHash=readOnly;
    let systemAdmin=localStorage.getItem(SYSTEM_ADMIN_KEY)||"";
    if(!systemAdmin){systemAdmin=await getDefaultHash();localStorage.setItem(SYSTEM_ADMIN_KEY,systemAdmin);}
    systemAdminPasswordHash=systemAdmin;
  }
  function saveLocalAdminCache(){
    if(adminPasswordHash)localStorage.setItem(PASS_KEY,adminPasswordHash);
    if(adminRecoveryHash)localStorage.setItem(RECOVERY_KEY,adminRecoveryHash);
    else localStorage.removeItem(RECOVERY_KEY);
    if(readOnlyPasswordHash)localStorage.setItem(READONLY_KEY,readOnlyPasswordHash);
    if(systemAdminPasswordHash)localStorage.setItem(SYSTEM_ADMIN_KEY,systemAdminPasswordHash);
  }
  function buildAdminPayload(reason){
    return {
      type:"admin-password-sync",
      version:"member-list-readonly-1.0",
      source:"member-list",
      reason:reason||"update",
      passwordHash:adminPasswordHash,
      recoveryHash:adminRecoveryHash||"",
      readOnlyHash:readOnlyPasswordHash||"",
      systemAdminHash:systemAdminPasswordHash||adminPasswordHash||"",
      updatedAt:Date.now(),
      updatedAtISO:new Date().toISOString()
    };
  }
  function writeAdminSync(reason){
    saveLocalAdminCache();
    if(!adminReady||!adminRef)return;
    clearTimeout(adminWriteTimer);
    adminWriteTimer=setTimeout(()=>{
      adminRef.set(buildAdminPayload(reason)).then(()=>{
        setRealtimeBoxMsg("동기화 완료",true);
      }).catch((error)=>{
        console.error("Admin password sync write failed",error);
        setRealtimeBoxMsg("동기화 실패",false);
      });
    },120);
  }
  async function seedAdminSyncIfEmpty(){
    if(!adminRef)return;
    await loadLocalAdminCache();
    adminRef.set(buildAdminPayload("initial-create")).catch((error)=>{
      console.error("Admin password initial create failed",error);
      setRealtimeBoxMsg("비밀번호 초기 생성 실패",false);
    });
  }
  async function initAdminFirebaseSync(){
    await loadLocalAdminCache();
    try{
      if(!window.firebase || !firebase.apps || !firebase.apps.length){
        adminRemoteLoaded=true;
        setGateMsg("Firebase 연결 전입니다. 이 기기 저장 비밀번호를 사용합니다.","#b45309");
        return;
      }
      adminDb=firebase.database(firebase.apps[0]);
      adminRef=adminDb.ref(ADMIN_SYNC_PATH);
      adminReady=true;
      adminDb.ref(".info/connected").on("value",snap=>{
        if(snap.val()===true)setRealtimeBoxMsg("연결됨",true);
      });
      adminRef.on("value",async snap=>{
        const payload=normalizeAdminPayload(snap.val());
        if(!payload){
          adminRemoteLoaded=true;
          await seedAdminSyncIfEmpty();
          setGateMsg("비밀번호 초기화 완료","#0b7a28");
          setTimeout(()=>setGateMsg(""),1200);
          return;
        }
        adminPasswordHash=payload.passwordHash;
        adminRecoveryHash=payload.recoveryHash||"";
        readOnlyPasswordHash=payload.readOnlyHash||readOnlyPasswordHash||await getDefaultReadOnlyHash();
        systemAdminPasswordHash=payload.systemAdminHash||systemAdminPasswordHash||await getDefaultHash();
        saveLocalAdminCache();
        adminRemoteLoaded=true;
        setGateMsg("");
      },error=>{
        console.error("Admin password sync read failed",error);
        adminRemoteLoaded=true;
        setGateMsg("비밀번호 동기화 읽기 실패. 이 기기 저장값으로 로그인합니다.","#b45309");
      });
    }catch(error){
      console.error("Admin password sync init failed",error);
      adminRemoteLoaded=true;
      setGateMsg("비밀번호 동기화 연결 실패. 이 기기 저장값으로 로그인합니다.","#b45309");
    }
  }
  async function ensureAdminReadyForLogin(){
    if(!adminRemoteLoaded){
      setGateMsg("비밀번호 동기화 확인중입니다. 잠시 후 다시 눌러주세요.","#b45309");
      await new Promise(resolve=>setTimeout(resolve,350));
    }
    if(!adminPasswordHash){adminPasswordHash=await getDefaultHash();writeAdminSync("default-created");}
    if(!readOnlyPasswordHash){readOnlyPasswordHash=await getDefaultReadOnlyHash();writeAdminSync("readonly-default-created");}
    if(!systemAdminPasswordHash){systemAdminPasswordHash=await getDefaultHash();writeAdminSync("system-admin-default-created");}
  }
  async function unlockWithPassword(){
    await ensureAdminReadyForLogin();
    const input=$("adminPasswordInput");
    const value=(input&&input.value||"").trim();
    if(await sha256(value)===adminPasswordHash){
      setUnlockedState(true,"edit");
      if(input)input.value="";
      setGateMsg("");
    }else{
      setGateMsg("관리자가 아닌 경우. 읽기전용으로 로그인하세요.");
      if(input){input.select();input.focus();}
    }
  }
  async function unlockReadOnlyWithPassword(){
    await ensureAdminReadyForLogin();
    const input=$("adminPasswordInput");
    const value=(input&&input.value||"").trim();
    if(await sha256(value)===readOnlyPasswordHash){
      setUnlockedState(true,"readonly");
      if(input)input.value="";
      setGateMsg("");
    }else{
      setGateMsg("읽기전용 비밀번호가 맞지 않습니다.");
      if(input){input.select();input.focus();}
    }
  }
  function resetViewToMinimumForLogin(){
    try{
      const viewport=document.querySelector('meta[name="viewport"]');
      if(viewport) viewport.setAttribute("content",LOCKED_VIEWPORT);
      const stage=document.getElementById("scaleStage");
      if(stage){stage.style.transform="none";stage.style.zoom="1";stage.style.width="";stage.style.height="auto";}
      const wrap=document.getElementById("tableWrap");
      if(wrap){wrap.scrollLeft=0;wrap.scrollTop=0;}
      document.documentElement.scrollLeft=0; document.documentElement.scrollTop=0;
      document.body.scrollLeft=0; document.body.scrollTop=0;
      window.scrollTo(0,0);
    }catch(e){}
  }
  function logout(){
    /* 로그아웃 버튼을 누른 경우에만 세션을 종료하고, 외부 페이지가 아닌 이 파일의 로그인 화면으로 이동합니다. */
    setUnlockedState(false);
    resetViewToMinimumForLogin();
    const input=$("adminPasswordInput");
    if(input)setTimeout(()=>{resetViewToMinimumForLogin();input.focus();},50);
  }
  async function changePassword(){
    await ensureAdminReadyForLogin();
    const oldPw=prompt("현재 관리자 비밀번호를 입력하세요.");
    if(oldPw===null)return;
    if(await sha256(oldPw.trim())!==adminPasswordHash){alert("현재 관리자 비밀번호가 맞지 않습니다.");return;}
    const next=prompt("새 관리자 비밀번호를 입력하세요.");
    if(next===null)return;
    if(!next.trim()){alert("새 비밀번호가 비어 있습니다.");return;}
    const again=prompt("새 관리자 비밀번호를 다시 입력하세요.");
    if(again===null)return;
    if(next.trim()!==again.trim()){alert("새 비밀번호가 서로 다릅니다.");return;}
    adminPasswordHash=await sha256(next.trim());
    writeAdminSync("admin-password-change");
    alert("관리자 비밀번호가 변경되었고 Firebase에 실시간 동기화되었습니다.");
  }
  async function changeReadOnlyPassword(){
    await ensureAdminReadyForLogin();
    const adminPw=prompt("관리자 비밀번호를 입력하세요.");
    if(adminPw===null)return;
    if(await sha256(adminPw.trim())!==adminPasswordHash){alert("관리자 비밀번호가 맞지 않습니다.");return;}
    const next=prompt("새 읽기전용 비밀번호를 입력하세요.");
    if(next===null)return;
    if(!next.trim()){alert("새 읽기전용 비밀번호가 비어 있습니다.");return;}
    const again=prompt("새 읽기전용 비밀번호를 다시 입력하세요.");
    if(again===null)return;
    if(next.trim()!==again.trim()){alert("읽기전용 비밀번호가 서로 다릅니다.");return;}
    readOnlyPasswordHash=await sha256(next.trim());
    writeAdminSync("readonly-password-change");
    alert("읽기전용 비밀번호가 변경되었고 Firebase에 실시간 동기화되었습니다.");
  }
  async function createRecoveryCode(){
    await ensureAdminReadyForLogin();
    const code=makeRecoveryCode();
    adminRecoveryHash=await sha256(code);
    writeAdminSync("recovery-code-create");
    alert("복구코드가 생성되었고 Firebase에 동기화되었습니다.\n\n"+code+"\n\n이 코드는 지금만 확인 가능합니다. 반드시 따로 보관하세요.");
  }
  async function resetPassword(){
    await ensureAdminReadyForLogin();
    const code=prompt("복구코드를 입력하세요.");
    if(code===null)return;
    if(!adminRecoveryHash){alert("생성된 복구코드가 없습니다. 관리자 로그인 후 복구코드를 먼저 생성하세요.");return;}
    if(await sha256(code.trim().toUpperCase())!==adminRecoveryHash){alert("복구코드가 맞지 않습니다.");return;}
    adminPasswordHash=await sha256(DEFAULT_PASSWORD);
    adminRecoveryHash="";
    writeAdminSync("password-reset");
    alert("관리자 비밀번호가 1234로 초기화되었고 Firebase에 실시간 동기화되었습니다.\n읽기전용 기본 비밀번호는 0000입니다.");
  }
  function closeAllToolbarGroups(){
    ["adminButtonGroup","editButtonGroup"].forEach(id=>{const panel=$(id); if(panel)panel.setAttribute("hidden","");});
    ["adminGroupToggleBtn","editGroupToggleBtn"].forEach(id=>{const btn=$(id); if(btn){btn.classList.remove("is-open");btn.setAttribute("aria-expanded","false");}});
  }

  async function openAdminGroupWithPassword(){
    await ensureAdminReadyForLogin();
    const pw=prompt("시스템관리자 비밀번호를 입력하세요.");
    if(pw===null)return;
    if(await sha256(pw.trim())!==systemAdminPasswordHash){
      alert("시스템관리자 비밀번호가 맞지 않습니다.");
      return;
    }
    closeAllToolbarGroups();
    const panel=$("adminButtonGroup");
    const btn=$("adminGroupToggleBtn");
    if(panel)panel.removeAttribute("hidden");
    if(btn){btn.classList.add("is-open");btn.setAttribute("aria-expanded","true");}
  }

  async function changeSystemAdminPassword(){
    await ensureAdminReadyForLogin();
    const oldPw=prompt("현재 시스템관리자 비밀번호를 입력하세요.");
    if(oldPw===null)return;
    if(await sha256(oldPw.trim())!==systemAdminPasswordHash){alert("현재 시스템관리자 비밀번호가 맞지 않습니다.");return;}
    const next=prompt("새 시스템관리자 비밀번호를 입력하세요.");
    if(next===null)return;
    if(!next.trim()){alert("새 시스템관리자 비밀번호가 비어 있습니다.");return;}
    const again=prompt("새 시스템관리자 비밀번호를 다시 입력하세요.");
    if(again===null)return;
    if(next.trim()!==again.trim()){alert("시스템관리자 비밀번호가 서로 다릅니다.");return;}
    systemAdminPasswordHash=await sha256(next.trim());
    writeAdminSync("system-admin-password-change");
    alert("시스템관리자 비밀번호가 변경되었고 Firebase에 실시간 동기화되었습니다.");
  }

  window.openAdminGroupWithPassword=openAdminGroupWithPassword;
  window.addEventListener("request-admin-group-open",openAdminGroupWithPassword);

  function bindAdmin(){
    let hasSavedSession=false;
    try{hasSavedSession=localStorage.getItem(SESSION_KEY)==="1";}catch(e){}
    if(!hasSavedSession){
      setViewportLockedForAdmin(true);
      document.body.classList.add("locked");
      document.body.classList.remove("unlocked","readonly-mode","edit-mode");
      document.documentElement.classList.remove("member-refresh-unlocked","member-refresh-readonly");
    }
    const loginBtn=$("adminLoginBtn");
    const readOnlyLoginBtn=$("readOnlyLoginBtn");
    const input=$("adminPasswordInput");
    const logoutBtn=$("adminLogoutBtn");
    const changeBtn=$("adminChangePasswordBtn");
    const readOnlyChangeBtn=$("readOnlyChangePasswordBtn");
    const recoveryBtn=$("adminRecoveryCodeBtn");
    const systemChangeBtn=$("systemAdminChangePasswordBtn");
    const resetBtn=$("adminResetPasswordBtn");
    if(loginBtn)loginBtn.onclick=unlockWithPassword;
    if(readOnlyLoginBtn)readOnlyLoginBtn.onclick=unlockReadOnlyWithPassword;
    if(input){
      input.placeholder="비밀번호 입력";
      input.addEventListener("keydown",(e)=>{if(e.key==="Enter")unlockWithPassword();});
      setTimeout(()=>input.focus(),80);
    }
    if(logoutBtn)logoutBtn.onclick=logout;
    if(changeBtn)changeBtn.onclick=changePassword;
    if(readOnlyChangeBtn)readOnlyChangeBtn.onclick=changeReadOnlyPassword;
    if(recoveryBtn)recoveryBtn.onclick=createRecoveryCode;
    if(systemChangeBtn)systemChangeBtn.onclick=changeSystemAdminPassword;
    if(resetBtn)resetBtn.onclick=resetPassword;

    /* PC/모바일 새로고침 방지: pagehide/beforeunload/visibilitychange에서 로그인 상태를 삭제하지 않습니다.
       로그아웃 버튼을 누를 때만 저장된 화면 상태를 삭제합니다. */

    setupMemberListExitGuard();
    initAdminFirebaseSync();
    restoreUnlockedSession();
  }
  if(document.readyState==="loading")document.addEventListener("DOMContentLoaded",bindAdmin);
  else bindAdmin();
})();
</script>

<script>
/* 관리자 모드: 읽기전용 로그인에서 보일 열을 설정 */
(function(){
  const CONFIG_KEY = "memberList.readonly.visibleColumns.v1";
  const DEFAULT_VISIBLE = [0, 1, 2, 5, 11, 12]; // 직책/이름/성별/연락처/닉네임/버스타는곳
  let lastSignature = "";

  function getTable(){ return document.getElementById("memberTable"); }
  function getHeaders(){
    const table = getTable();
    const first = table && table.rows && table.rows[0];
    if(!first) return [];
    return Array.from(first.cells).map((cell, idx)=>{
      const title = cell.dataset.headerTitle || cell.querySelector(".header-title")?.innerText || cell.innerText || ("열" + (idx + 1));
      return String(title).replace(/\s+/g," ").trim() || ("열" + (idx + 1));
    });
  }
  function readConfig(){
    try{
      const raw = localStorage.getItem(CONFIG_KEY);
      const arr = raw ? JSON.parse(raw) : DEFAULT_VISIBLE;
      if(Array.isArray(arr) && arr.length) return arr.map(Number).filter(n=>Number.isInteger(n) && n >= 0);
    }catch(e){}
    return DEFAULT_VISIBLE.slice();
  }
  function saveConfig(arr){
    const clean = Array.from(new Set(arr.map(Number).filter(n=>Number.isInteger(n) && n >= 0))).sort((a,b)=>a-b);
    localStorage.setItem(CONFIG_KEY, JSON.stringify(clean.length ? clean : DEFAULT_VISIBLE));
    applyReadonlyColumnVisibility(true);
  }
  function applyReadonlyColumnVisibility(force=false){
    const table = getTable();
    if(!table) return;
    const headers = getHeaders();
    const visible = new Set(readConfig());
    const signature = headers.length + "|" + Array.from(visible).join(",") + "|" + table.rows.length;
    if(!force && signature === lastSignature) return;
    lastSignature = signature;

    Array.from(table.querySelectorAll("col")).forEach((col, idx)=>{
      col.classList.toggle("readonly-hidden-column", !visible.has(idx));
    });
    Array.from(table.rows).forEach(row=>{
      Array.from(row.cells).forEach((cell, idx)=>{
        cell.classList.toggle("readonly-hidden-column", !visible.has(idx));
      });
    });
  }
  function closeModal(){
    const old = document.getElementById("readonlyColumnModalBackdrop");
    if(old) old.remove();
  }
  function showModal(){
    applyReadonlyColumnVisibility(true);
    const headers = getHeaders();
    if(!headers.length){ alert("표가 아직 준비되지 않았습니다."); return; }
    closeModal();
    const visible = new Set(readConfig());
    const backdrop = document.createElement("div");
    backdrop.id = "readonlyColumnModalBackdrop";
    backdrop.className = "readonly-column-modal-backdrop";
    backdrop.innerHTML = `
      <div class="readonly-column-modal" role="dialog" aria-modal="true">
        <h2>읽기전용 열 보기/숨김 설정</h2>
        <p class="readonly-column-desc">체크한 열만 읽기전용 로그인 화면에서 보입니다.<br>관리자/편집 로그인에서는 모든 열이 그대로 보입니다.</p>
        <div class="readonly-column-list"></div>
        <div class="readonly-column-actions">
          <button type="button" class="all">전체보기</button>
          <button type="button" class="default">기본값</button>
          <button type="button" class="cancel">취소</button>
          <button type="button" class="save">저장</button>
        </div>
      </div>`;
    const list = backdrop.querySelector(".readonly-column-list");
    headers.forEach((name, idx)=>{
      const label = document.createElement("label");
      label.className = "readonly-column-item";
      label.innerHTML = `<input type="checkbox" value="${idx}"> <span>${idx + 1}. ${name}</span>`;
      const input = label.querySelector("input");
      input.checked = visible.has(idx);
      list.appendChild(label);
    });
    backdrop.addEventListener("click", e=>{ if(e.target === backdrop) closeModal(); });
    backdrop.querySelector(".cancel").onclick = closeModal;
    backdrop.querySelector(".all").onclick = ()=>{ list.querySelectorAll("input").forEach(input=>input.checked = true); };
    backdrop.querySelector(".default").onclick = ()=>{ list.querySelectorAll("input").forEach(input=>input.checked = DEFAULT_VISIBLE.includes(Number(input.value))); };
    backdrop.querySelector(".save").onclick = ()=>{
      const selected = Array.from(list.querySelectorAll("input:checked")).map(input=>Number(input.value));
      if(!selected.length){ alert("읽기전용에서 최소 1개 열은 보여야 합니다."); return; }
      saveConfig(selected);
      closeModal();
      alert("읽기전용 열 보기/숨김 설정을 저장했습니다.");
    };
    document.body.appendChild(backdrop);
  }
  function bindButton(){
    const btn = document.getElementById("readOnlyColumnSettingBtn");
    if(btn && !btn.dataset.boundReadonlyColumn){
      btn.dataset.boundReadonlyColumn = "1";
      btn.addEventListener("click", showModal);
    }
  }
  window.applyReadonlyColumnVisibility = applyReadonlyColumnVisibility;
  document.addEventListener("DOMContentLoaded", ()=>{
    bindButton();
    applyReadonlyColumnVisibility(true);
    const table = getTable();
    if(table){
      new MutationObserver(()=>applyReadonlyColumnVisibility()).observe(table,{childList:true,subtree:true});
    }
  });
  if(document.readyState !== "loading"){
    bindButton();
    setTimeout(()=>applyReadonlyColumnVisibility(true), 0);
    const table = getTable();
    if(table){ new MutationObserver(()=>applyReadonlyColumnVisibility()).observe(table,{childList:true,subtree:true}); }
  }
})();
</script>


<script>
(function(){
  const PHONE_COLS = [5, 6]; // 연락처, 비상연락처
  const LONG_PRESS_MS = 1500;
  const MOVE_CANCEL_PX = 12;

  let holdTimer = null;
  let activeCell = null;
  let startX = 0;
  let startY = 0;
  let activePointerId = null;
  let suppressClickUntil = 0;

  function cleanPhone(text){
    return String(text || "").replace(/[^0-9]/g, "");
  }

  function showToast(message){
    const old = document.getElementById("phoneHoldToast");
    if(old) old.remove();
    const toast = document.createElement("div");
    toast.id = "phoneHoldToast";
    toast.className = "phone-hold-toast";
    toast.textContent = message;
    document.body.appendChild(toast);
    clearTimeout(window.__phoneHoldToastTimer);
    window.__phoneHoldToastTimer = setTimeout(()=>toast.remove(), 1200);
  }

  function getPhoneCell(target){
    const cell = target && target.closest ? target.closest("td.phone-hold-cell") : null;
    const table = document.getElementById("memberTable");
    if(!cell || !table || !table.contains(cell)) return null;
    return cell;
  }

  function markPhoneCells(){
    const table = document.getElementById("memberTable");
    if(!table || !table.tBodies || !table.tBodies[0]) return;
    Array.from(table.tBodies[0].rows).forEach((row, rowIndex)=>{
      if(rowIndex === 0) return;
      PHONE_COLS.forEach((colIndex)=>{
        const cell = row.cells[colIndex];
        if(!cell) return;
        const phone = cleanPhone(cell.innerText);
        if(phone.length < 9){
          cell.classList.remove("phone-hold-cell");
          delete cell.dataset.phoneNumber;
          return;
        }
        cell.classList.add("phone-hold-cell");
        cell.dataset.phoneNumber = phone;
        cell.style.fontWeight = "400";
        if(!cell.classList.contains("cell-editing") && !cell.classList.contains("phone-hold-editing")){
          cell.contentEditable = "false";
        }
      });
    });
  }

  function setCaretToEndSafe(cell){
    try{
      const range = document.createRange();
      range.selectNodeContents(cell);
      range.collapse(false);
      const sel = window.getSelection();
      sel.removeAllRanges();
      sel.addRange(range);
    }catch(error){}
  }

  function enablePhoneEdit(cell){
    if(!cell) return;
    try{ if(typeof window.lockAllCellEditing === "function") window.lockAllCellEditing(cell); }catch(error){}
    cell.contentEditable = "true";
    cell.classList.add("cell-editing", "selected-cell", "phone-hold-editing");
    cell.style.fontWeight = "400";

    // 기존 표 선택 로직(selectedCell)과 동기화해야 내용복사/붙여넣기 버튼도 바로 작동함
    try{
      cell.dispatchEvent(new MouseEvent("click", {bubbles:true, cancelable:true, view:window}));
    }catch(error){}

    cell.focus();
    setCaretToEndSafe(cell);
    showToast("편집/복사/붙여넣기 가능");
  }

  function closePhoneDropdown(){
    const old = document.getElementById("phoneDropdownMenu");
    if(old) old.remove();
  }

  function clamp(v, min, max){
    if(max < min) return min;
    return Math.max(min, Math.min(max, v));
  }

  function positionDropdown(menu, cell){
    const rect = cell.getBoundingClientRect();
    const scrollX = window.scrollX || document.documentElement.scrollLeft || 0;
    const scrollY = window.scrollY || document.documentElement.scrollTop || 0;
    const vw = window.innerWidth || document.documentElement.clientWidth || 320;
    const vh = window.innerHeight || document.documentElement.clientHeight || 480;

    menu.style.left = "0px";
    menu.style.top = "0px";
    document.body.appendChild(menu);

    const mw = menu.offsetWidth || 92;
    const mh = menu.offsetHeight || 86;
    let left = scrollX + rect.left + (rect.width / 2) - (mw / 2);
    let top = scrollY + rect.bottom + 2;

    if(rect.bottom + mh + 8 > vh){
      top = scrollY + rect.top - mh - 2;
    }
    left = clamp(left, scrollX + 4, scrollX + vw - mw - 4);
    top = clamp(top, scrollY + 4, scrollY + vh - mh - 4);

    menu.style.left = left + "px";
    menu.style.top = top + "px";
  }

  function escapeHtml(value){
    return String(value || "").replace(/[&<>"']/g, function(ch){
      return {"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#39;"}[ch] || ch;
    });
  }

  function getRowName(cell){
    try{
      const row = cell && cell.parentElement;
      const nameCell = row && row.cells ? row.cells[1] : null;
      const name = String(nameCell ? nameCell.innerText : "").trim();
      return name || "이름 없음";
    }catch(error){
      return "이름 없음";
    }
  }

  function openPhoneDropdown(cell){
    const phone = cell ? (cell.dataset.phoneNumber || cleanPhone(cell.innerText)) : "";
    if(phone.length < 9){
      showToast("전화번호 확인 필요");
      return;
    }

    closePhoneDropdown();
    suppressClickUntil = Date.now() + 900;

    const menu = document.createElement("div");
    menu.id = "phoneDropdownMenu";
    menu.className = "phone-dropdown-menu";
    menu.setAttribute("role", "menu");
    const rowName = getRowName(cell);
    menu.innerHTML = `
      <div class="phone-dropdown-name" title="${escapeHtml(rowName)}">${escapeHtml(rowName)}</div>
      <button type="button" class="edit" data-action="edit">✏️ 편집</button>
      <button type="button" class="call" data-action="call">📞 전화</button>
      <button type="button" class="sms" data-action="sms">💬 문자</button>`;

    menu.addEventListener("click", function(e){
      const btn = e.target && e.target.closest ? e.target.closest("button[data-action]") : null;
      if(!btn) return;
      e.preventDefault();
      e.stopPropagation();
      const action = btn.dataset.action;
      closePhoneDropdown();
      if(action === "edit") enablePhoneEdit(cell);
      if(action === "call") window.location.href = "tel:" + phone;
      if(action === "sms") window.location.href = "sms:" + phone;
    }, true);

    menu.addEventListener("contextmenu", (e)=>e.preventDefault(), true);
    positionDropdown(menu, cell);
  }

  function clearHoldTimer(){
    clearTimeout(holdTimer);
    holdTimer = null;
  }

  function cancelHold(){
    clearHoldTimer();
    activeCell = null;
    activePointerId = null;
  }

  function isMultiTouch(e){
    return !!(e && e.touches && e.touches.length > 1);
  }

  function getPoint(e){
    return e.touches && e.touches[0] ? e.touches[0] : e;
  }

  function isMobilePhoneMenuMode(){
    try{
      return window.matchMedia && (
        window.matchMedia("(max-width: 480px)").matches ||
        window.matchMedia("(pointer: coarse)").matches
      );
    }catch(error){
      return (window.innerWidth || 9999) <= 480;
    }
  }

  function startHold(e){
    /* 요청 수정: 전화/문자 박스는 모바일에서만 표시, PC에서는 더블클릭 편집만 허용 */
    if(!isMobilePhoneMenuMode()){
      closePhoneDropdown();
      cancelHold();
      return;
    }
    if(isMultiTouch(e)){
      cancelHold();
      return;
    }
    const cell = getPhoneCell(e.target);
    if(!cell) return;
    if(cell.classList.contains("phone-hold-editing") || cell.classList.contains("cell-editing") || cell.isContentEditable){
      return; // 더블클릭으로 편집 중일 때는 커서 이동/복사/붙여넣기 기본 동작 허용
    }

    e.stopPropagation();
    if(e.stopImmediatePropagation) e.stopImmediatePropagation();

    const p = getPoint(e);
    startX = p.clientX || 0;
    startY = p.clientY || 0;
    activeCell = cell;
    activePointerId = e.pointerId != null ? e.pointerId : null;
    clearHoldTimer();

    holdTimer = setTimeout(()=>{
      if(!activeCell) return;
      openPhoneDropdown(activeCell);
      cancelHold();
    }, LONG_PRESS_MS);
  }

  function moveHold(e){
    if(!activeCell) return;
    if(isMultiTouch(e)){
      cancelHold();
      return;
    }
    if(activePointerId != null && e.pointerId != null && e.pointerId !== activePointerId) return;
    const p = getPoint(e);
    const dx = Math.abs((p.clientX || 0) - startX);
    const dy = Math.abs((p.clientY || 0) - startY);
    if(dx > MOVE_CANCEL_PX || dy > MOVE_CANCEL_PX){
      cancelHold();
    }
  }

  function endHold(e){
    const hadCell = !!activeCell;
    cancelHold();
    if(hadCell && Date.now() < suppressClickUntil && e){
      e.preventDefault();
      e.stopPropagation();
      if(e.stopImmediatePropagation) e.stopImmediatePropagation();
    }
  }

  function blockPhoneDefaults(e){
    const cell = getPhoneCell(e.target);
    if(!cell) return;
    if(!isMobilePhoneMenuMode()){
      return; // PC에서는 전화/문자 박스 차단, 더블클릭 편집 기본 흐름 유지
    }
    if(cell.classList.contains("phone-hold-editing") || cell.classList.contains("cell-editing") || cell.isContentEditable){
      return; // 편집 상태에서는 텍스트 선택/복사/붙여넣기 허용
    }
    e.preventDefault();
    e.stopPropagation();
    if(e.stopImmediatePropagation) e.stopImmediatePropagation();
  }

  function bindPhoneHold(){
    markPhoneCells();
    if(document.body.dataset.phoneHoldEditCallBind === "3") return;
    document.body.dataset.phoneHoldEditCallBind = "3";

    document.addEventListener("contextmenu", blockPhoneDefaults, true);
    document.addEventListener("selectstart", blockPhoneDefaults, true);
    document.addEventListener("dragstart", blockPhoneDefaults, true);

    if(window.PointerEvent){
      document.addEventListener("pointerdown", startHold, true);
      document.addEventListener("pointermove", moveHold, true);
      document.addEventListener("pointerup", endHold, true);
      document.addEventListener("pointercancel", endHold, true);
    }else{
      document.addEventListener("touchstart", startHold, {capture:true, passive:true});
      document.addEventListener("touchmove", moveHold, {capture:true, passive:true});
      document.addEventListener("touchend", endHold, true);
      document.addEventListener("touchcancel", endHold, true);
      document.addEventListener("mousedown", startHold, true);
      document.addEventListener("mousemove", moveHold, true);
      document.addEventListener("mouseup", endHold, true);
    }

    document.addEventListener("dblclick", function(e){
      const cell = getPhoneCell(e.target);
      if(!cell) return;
      e.preventDefault();
      e.stopPropagation();
      if(e.stopImmediatePropagation) e.stopImmediatePropagation();
      clearHoldTimer();
      closePhoneDropdown();
      enablePhoneEdit(cell);
    }, true);

    document.addEventListener("click", function(e){
      const menu = document.getElementById("phoneDropdownMenu");
      if(menu && !menu.contains(e.target) && !getPhoneCell(e.target)) closePhoneDropdown();
      if(Date.now() < suppressClickUntil && getPhoneCell(e.target)) blockPhoneDefaults(e);
    }, true);

    document.addEventListener("scroll", closePhoneDropdown, true);
    window.addEventListener("resize", function(){
      closePhoneDropdown();
      cancelHold();
    }, true);

    document.addEventListener("input", function(e){
      const cell = getPhoneCell(e.target);
      if(cell){
        cell.dataset.phoneNumber = cleanPhone(cell.innerText);
        cell.style.fontWeight = "400";
      }
    }, true);
    document.addEventListener("blur", function(e){
      const cell = e.target && e.target.closest ? e.target.closest("td.phone-hold-cell") : null;
      if(cell){
        cell.classList.remove("phone-hold-editing");
        cell.dataset.phoneNumber = cleanPhone(cell.innerText);
        cell.style.fontWeight = "400";
      }
    }, true);
  }

  document.addEventListener("DOMContentLoaded", function(){
    setTimeout(bindPhoneHold, 300);
    setTimeout(markPhoneCells, 1000);
    setTimeout(markPhoneCells, 2500);
    const observer = new MutationObserver(function(){
      clearTimeout(window.__phoneHoldMarkTimer);
      window.__phoneHoldMarkTimer = setTimeout(markPhoneCells, 150);
    });
    observer.observe(document.body, {childList:true, subtree:true, characterData:true});
  });
})();
</script>

<script id="readonlyMobileForceFix">
/* 최종 보강: 읽기전용 로그인 직후/모바일 리사이즈/표 재생성 후 열 숨김 재적용 */
(function(){
  const CONFIG_KEY = "memberList.readonly.visibleColumns.v1";
  const DEFAULT_VISIBLE = [0, 1, 2, 5, 11, 12]; // 직책/이름/성별/연락처/닉네임/버스타는곳
  const DEFAULT_NAMES = ["직책", "이름", "성별", "연락처", "닉네임", "버스타는곳"];
  function getTable(){ return document.getElementById("memberTable"); }
  function norm(v){ return String(v || "").replace(/\s+/g, "").trim(); }
  function getHeaders(table){
    const first = table && table.rows && table.rows[0];
    if(!first) return [];
    return Array.from(first.cells).map((cell, idx)=>{
      return norm(cell.dataset.headerTitle || (cell.querySelector(".header-title") && cell.querySelector(".header-title").innerText) || cell.innerText || ("열" + (idx + 1)));
    });
  }
  function readVisibleIndexes(table){
    try{
      const raw = localStorage.getItem(CONFIG_KEY);
      const arr = raw ? JSON.parse(raw) : null;
      if(Array.isArray(arr) && arr.length){
        return new Set(arr.map(Number).filter(n => Number.isInteger(n) && n >= 0));
      }
    }catch(e){}
    const headers = getHeaders(table);
    const byName = [];
    DEFAULT_NAMES.forEach(name=>{
      const target = norm(name);
      const idx = headers.findIndex(h => h === target || h.includes(target));
      if(idx >= 0) byName.push(idx);
    });
    return new Set(byName.length ? byName : DEFAULT_VISIBLE);
  }
  function forceReadonlyColumns(){
    const table = getTable();
    if(!table || !table.rows || !table.rows.length) return;
    const readonly = document.body.classList.contains("readonly-mode");
    const visible = readVisibleIndexes(table);

    Array.from(table.querySelectorAll("col")).forEach((col, idx)=>{
      const hide = !visible.has(idx);
      col.classList.toggle("readonly-hidden-column", hide);
      col.style.display = (readonly && hide) ? "none" : "";
      col.style.visibility = (readonly && hide) ? "collapse" : "";
      col.style.width = (readonly && hide) ? "0px" : "";
    });
    Array.from(table.rows).forEach(row=>{
      Array.from(row.cells).forEach((cell, idx)=>{
        const hide = !visible.has(idx);
        cell.classList.toggle("readonly-hidden-column", hide);
        if(readonly && hide){
          cell.style.display = "none";
          cell.style.visibility = "collapse";
          cell.style.width = "0px";
          cell.style.minWidth = "0px";
          cell.style.maxWidth = "0px";
          cell.style.padding = "0px";
          cell.style.borderWidth = "0px";
        }else{
          cell.style.display = "";
          cell.style.visibility = "";
          cell.style.width = "";
          cell.style.minWidth = "";
          cell.style.maxWidth = "";
          cell.style.padding = "";
          cell.style.borderWidth = "";
        }
      });
    });
    if(typeof window.applyReadonlyColumnVisibility === "function"){
      try{ window.applyReadonlyColumnVisibility(true); }catch(e){}
    }
  }
  function scheduleForce(){
    forceReadonlyColumns();
    setTimeout(forceReadonlyColumns, 50);
    setTimeout(forceReadonlyColumns, 250);
    setTimeout(forceReadonlyColumns, 800);
  }
  document.addEventListener("DOMContentLoaded", scheduleForce);
  window.addEventListener("resize", scheduleForce);
  window.addEventListener("orientationchange", scheduleForce);
  document.addEventListener("visibilitychange", scheduleForce);
  document.addEventListener("click", e=>{
    if(e.target && (e.target.id === "readOnlyLoginBtn" || e.target.id === "adminLogoutBtn" || e.target.id === "adminLoginBtn")) scheduleForce();
  }, true);
  const table = getTable();
  if(table){ new MutationObserver(scheduleForce).observe(table, {childList:true, subtree:true}); }
  scheduleForce();
})();
</script>

<script id="adminColumnViewScript">
/* 관리자 모드: 필요한 열만 보기/숨김 설정 */
(function(){
  const CONFIG_KEY = "memberList.admin.visibleColumns.v1";
  let lastSignature = "";

  function getTable(){ return document.getElementById("memberTable"); }
  function getHeaders(){
    const table = getTable();
    const first = table && table.rows && table.rows[0];
    if(!first) return [];
    return Array.from(first.cells).map((cell, idx)=>{
      const title = cell.dataset.headerTitle || (cell.querySelector(".header-title") && cell.querySelector(".header-title").innerText) || cell.innerText || ("열" + (idx + 1));
      return String(title).replace(/\s+/g," ").trim() || ("열" + (idx + 1));
    });
  }
  function allIndexes(){ return getHeaders().map((_, idx)=>idx); }
  function readConfig(){
    const headers = getHeaders();
    if(!headers.length) return [];
    try{
      const raw = localStorage.getItem(CONFIG_KEY);
      const arr = raw ? JSON.parse(raw) : null;
      if(Array.isArray(arr) && arr.length){
        return arr.map(Number).filter(n=>Number.isInteger(n) && n >= 0 && n < headers.length);
      }
    }catch(e){}
    return allIndexes();
  }
  function saveConfig(arr){
    const headers = getHeaders();
    const clean = Array.from(new Set(arr.map(Number).filter(n=>Number.isInteger(n) && n >= 0 && n < headers.length))).sort((a,b)=>a-b);
    localStorage.setItem(CONFIG_KEY, JSON.stringify(clean.length ? clean : allIndexes()));
    applyAdminColumnVisibility(true);
  }
  function applyAdminColumnVisibility(force=false){
    const table = getTable();
    if(!table || !table.rows || !table.rows.length) return;
    const headers = getHeaders();
    const visible = new Set(readConfig());
    const allVisible = headers.length > 0 && visible.size >= headers.length;
    document.body.classList.toggle("admin-column-view-enabled", !allVisible);
    const signature = headers.length + "|" + Array.from(visible).join(",") + "|" + table.rows.length + "|" + document.body.className;
    if(!force && signature === lastSignature) return;
    lastSignature = signature;

    Array.from(table.querySelectorAll("col")).forEach((col, idx)=>{
      col.classList.toggle("admin-hidden-column", !visible.has(idx));
    });
    Array.from(table.rows).forEach(row=>{
      Array.from(row.cells).forEach((cell, idx)=>{
        cell.classList.toggle("admin-hidden-column", !visible.has(idx));
      });
    });
  }
  function closeModal(){
    const old = document.getElementById("adminColumnModalBackdrop");
    if(old) old.remove();
  }
  function showModal(){
    const headers = getHeaders();
    if(!headers.length){ alert("표가 아직 준비되지 않았습니다."); return; }
    closeModal();
    const visible = new Set(readConfig());
    const backdrop = document.createElement("div");
    backdrop.id = "adminColumnModalBackdrop";
    backdrop.className = "admin-column-modal-backdrop";
    backdrop.innerHTML = `
      <div class="admin-column-modal" role="dialog" aria-modal="true">
        <h2>관리자 열보기 설정</h2>
        <p class="admin-column-desc">체크한 열만 관리자 화면에서 보입니다.<br>읽기전용 열 설정과는 별도로 저장됩니다.</p>
        <div class="admin-column-list"></div>
        <div class="admin-column-actions">
          <button type="button" class="all">전체보기</button>
          <button type="button" class="cancel">취소</button>
          <button type="button" class="save">저장</button>
        </div>
      </div>`;
    const list = backdrop.querySelector(".admin-column-list");
    headers.forEach((name, idx)=>{
      const label = document.createElement("label");
      label.className = "admin-column-item";
      label.innerHTML = `<input type="checkbox" value="${idx}"> <span>${idx + 1}. ${name}</span>`;
      const input = label.querySelector("input");
      input.checked = visible.has(idx);
      list.appendChild(label);
    });
    backdrop.addEventListener("click", e=>{ if(e.target === backdrop) closeModal(); });
    backdrop.querySelector(".cancel").onclick = closeModal;
    backdrop.querySelector(".all").onclick = ()=>{ list.querySelectorAll("input").forEach(input=>input.checked = true); };
    backdrop.querySelector(".save").onclick = ()=>{
      const selected = Array.from(list.querySelectorAll("input:checked")).map(input=>Number(input.value));
      if(!selected.length){ alert("관리자 화면에서 최소 1개 열은 보여야 합니다."); return; }
      saveConfig(selected);
      closeModal();
      alert("관리자 열보기 설정을 저장했습니다.");
    };
    document.body.appendChild(backdrop);
  }
  function bindButton(){
    const btn = document.getElementById("adminColumnSettingBtn");
    if(btn && !btn.dataset.boundAdminColumn){
      btn.dataset.boundAdminColumn = "1";
      btn.addEventListener("click", showModal);
    }
  }
  function scheduleApply(){
    applyAdminColumnVisibility(true);
    setTimeout(()=>applyAdminColumnVisibility(true), 80);
    setTimeout(()=>applyAdminColumnVisibility(true), 300);
  }
  window.applyAdminColumnVisibility = applyAdminColumnVisibility;
  document.addEventListener("DOMContentLoaded", ()=>{
    bindButton();
    scheduleApply();
    const table = getTable();
    if(table){ new MutationObserver(scheduleApply).observe(table,{childList:true,subtree:true}); }
  });
  window.addEventListener("resize", scheduleApply);
  window.addEventListener("orientationchange", scheduleApply);
  document.addEventListener("click", e=>{
    if(e.target && (e.target.id === "adminLoginBtn" || e.target.id === "adminLogoutBtn" || e.target.id === "adminColumnSettingBtn")) scheduleApply();
  }, true);
  if(document.readyState !== "loading"){
    bindButton();
    scheduleApply();
    const table = getTable();
    if(table){ new MutationObserver(scheduleApply).observe(table,{childList:true,subtree:true}); }
  }

  /* 요청 수정: 필터 내용이 많아도 박스 상단은 항상 회색 제목행 아래에 고정 */
  function positionFloatingFilterPanels(){
    document.querySelectorAll(".multi-filter-panel:not([hidden])").forEach(panel=>{
      const wrap = panel.closest(".header-filter-wrap");
      const toggle = wrap ? wrap.querySelector(".column-filter-toggle") : null;
      const th = panel.closest("th");
      if(!toggle) return;

      const colIndex = Number(panel.dataset.col);
      const firstDataCell = Number.isFinite(colIndex) && table && table.rows && table.rows[1]
        ? table.rows[1].cells[colIndex]
        : null;

      const toggleRect = toggle.getBoundingClientRect();
      const headerRow = table && table.rows && table.rows[0] ? table.rows[0] : null;
      const headerRowRect = headerRow ? headerRow.getBoundingClientRect() : toggleRect;
      const thRect = th ? th.getBoundingClientRect() : headerRowRect;
      const baseRect = firstDataCell ? firstDataCell.getBoundingClientRect() : thRect;
      const panelWidth = Math.max(panel.offsetWidth || 126, 126);

      /* 요청 수정: 모바일에서는 전체 화면 중앙이 아니라 필터를 누른 열의 좌우 위치에서 표시 */
      const isMobileFilterView = window.matchMedia && window.matchMedia("(max-width:480px)").matches;
      let left = isMobileFilterView ? toggleRect.left : baseRect.left;
      if(left + panelWidth > window.innerWidth - 6){
        left = Math.max(6, window.innerWidth - panelWidth - 6);
      }
      left = Math.max(6, left);

      /* 핵심 수정: 스크롤 상태에서 table.rows[1]의 실제 위치가 화면 위로 올라가도
         그 값을 쓰지 않는다. 필터박스 상단은 항상 현재 화면에 보이는 회색 제목행의
         아래쪽(= 회원데이터박스 첫칸 시작선)에 고정한다. */
      const tableWrapRect = tableWrap ? tableWrap.getBoundingClientRect() : headerRowRect;
      const visibleHeaderBottom = Math.max(headerRowRect.bottom, tableWrapRect.top);
      const fixedTop = Math.max(6, visibleHeaderBottom + 2);

      /* 내용이 많아도 top을 위로 보정하지 않고, 아래 공간만큼 높이만 줄여 내부 스크롤한다. */
      const availableHeight = Math.max(44, window.innerHeight - fixedTop - 6);

      /* 기존 CSS에 top:auto !important / max-height !important가 있어서
         일반 inline style이 무시될 수 있으므로 setProperty(..., 'important')로 강제 */
      panel.style.setProperty("position", "fixed", "important");
      panel.style.setProperty("left", left + "px", "important");
      panel.style.setProperty("top", fixedTop + "px", "important");
      panel.style.setProperty("right", "auto", "important");
      panel.style.setProperty("bottom", "auto", "important");
      panel.style.setProperty("transform", "none", "important");
      panel.style.setProperty("max-height", Math.min(280, availableHeight) + "px", "important");
      panel.style.setProperty("height", "auto", "important");
      panel.style.setProperty("overflow-y", "auto", "important");
      panel.style.setProperty("z-index", "2147483647", "important");
    });
  }

  function scheduleFloatingFilterPosition(){
    requestAnimationFrame(positionFloatingFilterPanels);
    setTimeout(positionFloatingFilterPanels, 30);
    setTimeout(positionFloatingFilterPanels, 120);
  }

  document.addEventListener("click", function(e){
    const toggle = e.target && e.target.closest ? e.target.closest(".column-filter-toggle") : null;
    if(toggle){
      scheduleFloatingFilterPosition();
    }
  }, true);

  document.addEventListener("change", function(e){
    if(e.target && e.target.closest && e.target.closest(".multi-filter-panel")){
      scheduleFloatingFilterPosition();
    }
  }, true);

  window.addEventListener("scroll", positionFloatingFilterPanels, true);
  window.addEventListener("resize", positionFloatingFilterPanels);
  if(tableWrap){
    tableWrap.addEventListener("scroll", positionFloatingFilterPanels, true);
  }


  /* 요청 수정: 필터가 열린 제목셀에 클래스를 부여해 인접 열보다 앞으로 표시 */
  function markOpenFilterHeaderCells(){
    document.querySelectorAll(".filter-header-open").forEach(el=>el.classList.remove("filter-header-open"));
    document.querySelectorAll(".multi-filter-panel:not([hidden])").forEach(panel=>{
      const th = panel.closest("th");
      if(th) th.classList.add("filter-header-open");
    });
  }

  document.addEventListener("click", function(){
    setTimeout(markOpenFilterHeaderCells, 0);
    setTimeout(markOpenFilterHeaderCells, 80);
  }, true);

  document.addEventListener("change", function(){
    setTimeout(markOpenFilterHeaderCells, 0);
  }, true);

  /* 요청 수정: 필터 실행 중 셀 편집 시 행이 즉시 사라지지 않도록 필터 재적용 잠금 */
  let filterApplyLockedByEditing = false;
  let filterApplyAfterEditingTimer = null;

  function lockFilterApplyWhileEditing(){
    filterApplyLockedByEditing = true;
    document.body.classList.add("filter-edit-lock");
  }

  function unlockFilterApplyAfterEditing(){
    clearTimeout(filterApplyAfterEditingTimer);
    filterApplyAfterEditingTimer = setTimeout(()=>{
      filterApplyLockedByEditing = false;
      document.body.classList.remove("filter-edit-lock");
      if(typeof applyColumnFilters === "function"){
        applyColumnFilters();
      }else if(typeof applyFilters === "function"){
        applyFilters();
      }else if(typeof updateFilterCounters === "function"){
        updateFilterCounters();
      }
    }, 250);
  }

  document.addEventListener("focusin", function(e){
    const cell = e.target && e.target.closest ? e.target.closest("#memberTable td") : null;
    if(cell){
      lockFilterApplyWhileEditing();
    }
  }, true);

  document.addEventListener("input", function(e){
    const cell = e.target && e.target.closest ? e.target.closest("#memberTable td") : null;
    if(cell){
      lockFilterApplyWhileEditing();
      cell.classList.remove("hidden-by-search");
      const row = cell.closest("tr");
      if(row) row.classList.remove("hidden-by-search");
    }
  }, true);

  document.addEventListener("focusout", function(e){
    const cell = e.target && e.target.closest ? e.target.closest("#memberTable td") : null;
    if(cell){
      unlockFilterApplyAfterEditing();
    }
  }, true);

  document.addEventListener("keydown", function(e){
    if(e.key === "Enter"){
      const cell = e.target && e.target.closest ? e.target.closest("#memberTable td") : null;
      if(cell){
        unlockFilterApplyAfterEditing();
      }
    }
  }, true);


  /* 요청 수정 보강: 카운터 표시 대상 열에 성별/출생년도 포함 */
  const FILTER_COUNTER_TARGET_HEADER_NAMES_PATCH = new Set(["직책","이름","성별","출생년도","거주지","버스타는곳","참석","가입:승인","승인결과"]);
  function normalizeFilterCounterHeaderNameForPatch(text){
    return String(text || "").replace(/\s+/g, " ").trim();
  }
  function isAllowedFilterCounterHeaderForPatch(text){
    return FILTER_COUNTER_TARGET_HEADER_NAMES_PATCH.has(normalizeFilterCounterHeaderNameForPatch(text));
  }

})();
</script>


<script id="forceFilterPanelBelowHeaderFix">
(function(){
  "use strict";

  function getHeaderBottom(){
    const table = document.getElementById("memberTable");
    const tableWrap = document.getElementById("tableWrap");
    const headerRow = table && table.rows && table.rows.length ? table.rows[0] : null;
    const headerRect = headerRow ? headerRow.getBoundingClientRect() : null;
    const wrapRect = tableWrap ? tableWrap.getBoundingClientRect() : null;

    // 회색 제목행이 sticky 상태일 때도 현재 화면에 보이는 제목행 하단을 기준으로 고정
    if(headerRect){
      return Math.max(0, Math.round(headerRect.bottom + 2));
    }
    if(wrapRect){
      return Math.max(0, Math.round(wrapRect.top + 80));
    }
    return 80;
  }

  function getPanelLeft(panel){
    const th = panel.closest("th");
    const toggle = th ? th.querySelector(".column-filter-toggle") : null;
    const rect = toggle ? toggle.getBoundingClientRect() : (th ? th.getBoundingClientRect() : null);
    const panelWidth = Math.max(panel.offsetWidth || 126, 126);
    let left = rect ? rect.left : 6;
    if(left + panelWidth > window.innerWidth - 6){
      left = window.innerWidth - panelWidth - 6;
    }
    return Math.max(6, Math.round(left));
  }

  function forceFilterPanelBelowHeader(){
    const top = getHeaderBottom();
    const maxHeight = Math.max(50, window.innerHeight - top - 8);
    document.querySelectorAll(".multi-filter-panel:not([hidden])").forEach(panel=>{
      const left = getPanelLeft(panel);
      panel.style.setProperty("position", "fixed", "important");
      panel.style.setProperty("top", top + "px", "important");
      panel.style.setProperty("left", left + "px", "important");
      panel.style.setProperty("right", "auto", "important");
      panel.style.setProperty("bottom", "auto", "important");
      panel.style.setProperty("transform", "none", "important");
      panel.style.setProperty("height", "auto", "important");
      panel.style.setProperty("max-height", Math.min(280, maxHeight) + "px", "important");
      panel.style.setProperty("overflow-y", "auto", "important");
      panel.style.setProperty("z-index", "2147483647", "important");
    });
  }

  function scheduleForce(){
    forceFilterPanelBelowHeader();
    requestAnimationFrame(forceFilterPanelBelowHeader);
    setTimeout(forceFilterPanelBelowHeader, 20);
    setTimeout(forceFilterPanelBelowHeader, 80);
    setTimeout(forceFilterPanelBelowHeader, 200);
  }

  // 기존 코드가 클릭 후 위치를 다시 잡아도 마지막에 이 보정이 이기도록 강제 실행
  document.addEventListener("click", function(e){
    if(e.target && e.target.closest && (e.target.closest(".column-filter-toggle") || e.target.closest(".multi-filter-panel"))){
      scheduleForce();
    }
  }, true);

  document.addEventListener("change", function(e){
    if(e.target && e.target.closest && e.target.closest(".multi-filter-panel")){
      scheduleForce();
    }
  }, true);

  window.addEventListener("scroll", scheduleForce, true);
  window.addEventListener("resize", scheduleForce);
  window.addEventListener("orientationchange", scheduleForce);

  const table = document.getElementById("memberTable");
  if(table){
    new MutationObserver(scheduleForce).observe(table, {subtree:true, childList:true, attributes:true, attributeFilter:["hidden", "style", "class"]});
  }

  window.forceFilterPanelBelowHeader = scheduleForce;
})();
</script>



<script id="checkboxStayOpenPatch">
(function(){
  "use strict";

  let lastFilterCol = null;

  function getPanelFromTarget(target){
    return target && target.closest ? target.closest(".multi-filter-panel") : null;
  }

  function rememberPanel(panel){
    if(!panel) return;
    lastFilterCol = panel.getAttribute("data-col");
  }

  function reopenPanelByCol(col){
    if(col === null || col === undefined) return;
    var panel = document.querySelector('.multi-filter-panel[data-col="' + String(col).replace(/"/g, '\\"') + '"]');
    if(!panel) return;
    panel.hidden = false;
    var th = panel.closest("th");
    if(th) th.classList.add("filter-header-open");
    if(typeof window.forceFilterPanelBelowHeader === "function") window.forceFilterPanelBelowHeader();
    if(typeof window.scheduleFloatingFilterPosition === "function") window.scheduleFloatingFilterPosition();
  }

  function keepPanelOpen(target){
    var panel = getPanelFromTarget(target);
    if(panel){
      rememberPanel(panel);
      panel.hidden = false;
      var col = panel.getAttribute("data-col");
      requestAnimationFrame(function(){ reopenPanelByCol(col); });
      setTimeout(function(){ reopenPanelByCol(col); }, 0);
      setTimeout(function(){ reopenPanelByCol(col); }, 80);
      setTimeout(function(){ reopenPanelByCol(col); }, 200);
    }else if(lastFilterCol !== null){
      requestAnimationFrame(function(){ reopenPanelByCol(lastFilterCol); });
    }
  }

  ["mousedown","pointerdown","touchstart","click"].forEach(function(type){
    document.addEventListener(type, function(e){
      if(e.target && e.target.closest && e.target.closest(".column-filter-check")){
        // 체크박스 자체 토글은 그대로 두고, 외부 클릭 닫힘 이벤트만 차단
        e.stopPropagation();
        keepPanelOpen(e.target);
      }
      if(e.target && e.target.closest && e.target.closest(".multi-filter-option")){
        e.stopPropagation();
        keepPanelOpen(e.target);
      }
    }, true);
  });

  document.addEventListener("change", function(e){
    if(e.target && e.target.closest && e.target.closest(".column-filter-check")){
      e.stopPropagation();
      keepPanelOpen(e.target);
    }
  }, true);

  document.addEventListener("input", function(e){
    if(e.target && e.target.closest && e.target.closest(".column-filter-check")){
      e.stopPropagation();
      keepPanelOpen(e.target);
    }
  }, true);
})();
</script>
