/* 셀 글자 자동완성 */

<script id="refreshSessionNoFlashEarly">
(function(){
  try{
    var backKey = "memberList.admin.backExitAt.v1";
    var lastBack = Number(localStorage.getItem(backKey) || 0);
    if(lastBack && Date.now() - lastBack > 5000){
      localStorage.removeItem("memberList.admin.sessionUnlocked.v1");
      localStorage.removeItem("memberList.admin.sessionMode.v1");
      localStorage.removeItem(backKey);
      document.documentElement.classList.remove("member-refresh-unlocked", "member-refresh-readonly");

    if(localStorage.getItem("memberList.admin.sessionUnlocked.v1") === "1"){
      document.documentElement.classList.add("member-refresh-unlocked");
      if((localStorage.getItem("memberList.admin.sessionMode.v1") || "edit") === "readonly"){
        document.documentElement.classList.add("member-refresh-readonly");
      }
    }
  }catch(e){}
})();
</script>

  let isCellEditing=false;

  function buildFirebasePayload(reason="seed"){
    const data=collectData();
    return {
      type:"member-list-table-data",
      version:"membel-list-realtime-2.0",
      source:"member-list",
      reason,
      updatedBy:CLIENT_ID,
      clientId:CLIENT_ID,
      totalCount:Number(document.getElementById("totalCount")?.textContent||0),
      updatedAt:Date.now(),
      updatedAtISO:new Date().toISOString(),
      data
    };
  }

  function hasMeaningfulMemberData(data){
    const normalized=normalizeData(data);
    if(!normalized) return false;
    const nameCol=1;
    return normalized.rows.slice(1).some(row=>{
      const cell=row[nameCol];
      return String(cell?.html||cell?.text||cell?.v||"").replace(/<[^>]*>/g,"").trim()!=="";
    });
  }

  function initFirebaseRealtime(){
    try{
      if(!window.firebase){
        setRealtimeStatus("Firebase SDK 로딩 실패",false);
        return;
      }

      firebaseApp = firebase.apps && firebase.apps.length
        ? firebase.apps[0]
        : firebase.initializeApp(firebaseConfig);
      firebaseDb = firebase.database(firebaseApp);
      firebaseRef = firebaseDb.ref(FIREBASE_PATH);
      try{
        firebaseDb.ref(MEMBER_LIST_DELETED_JOIN_PATH).on("value",(snap)=>{
          deletedJoinCodeMap = snap.exists() && snap.val() && typeof snap.val()==="object" ? snap.val() : {};
          deletedJoinMarkerReady = true;
          flushPendingBusSeatApprovedMemberSync();
        });
      }catch(e){
        console.warn("Deleted join marker watch failed", e);
        deletedJoinMarkerReady = true;
      }
      firebaseReady = true;
      setRealtimeStatus("Firebase 초기화 완료",true);

      firebaseDb.ref(".info/connected").on("value",(snap)=>{
        if(snap.val()===true){
          setRealtimeStatus("실시간 연결됨",true);
          if(firebaseWritePending){
            const reason = firebaseWritePendingReason || "pending-reconnect";
            firebaseWritePending = false;
            firebaseWritePendingReason = "";
            pushRealtimeNow(reason,0);
          }
        }else{
          setRealtimeStatus("실시간 연결 대기중",false);
        }
      });

      firebaseRef.on("value",(snap)=>{
        if(!snap.exists()){
          const localData=collectData();
          const payload=buildFirebasePayload("initial-create");
          firebaseRef.set(payload).then(()=>{
            firebaseInitialLoaded = true;
            ensureCurrentMasterBaseline();
            setRealtimeStatus("초기 데이터 생성 완료",true);
          }).catch((error)=>{
            console.error("Firebase initial create failed",error);
            setRealtimeStatus("초기 데이터 생성 실패: "+(error&&error.code?error.code:"오류"),false);
          });
          return;
        }

        const value=snap.val();
        const remoteData=value&&value.data?value.data:value;
        const data=normalizeData(remoteData);
        if(!data){
          setRealtimeStatus("실시간 데이터 형식 오류",false);
          return;
        }

        /* 내가 방금 저장한 데이터가 다시 돌아온 경우에는 화면을 다시 그리지 않음.
           다른 기기에서 저장된 데이터는 새로고침 없이 즉시 화면에 반영함. */
        const remoteClientId=String((value&&(value.updatedBy||value.clientId))||"");
        if(remoteClientId && remoteClientId===CLIENT_ID){
          saveToAllKeys(data);
          firebaseInitialLoaded = true;
          ensureCurrentMasterBaseline();
          setRealtimeStatus("저장 완료",true);
          return;
        }

        applyingRemoteData=true;
        applyData(data);
        saveToAllKeys(collectData());
        applyingRemoteData=false;
        pendingRemoteData=null;
        firebaseInitialLoaded = true;
        ensureCurrentMasterBaseline();
        setRealtimeStatus("실시간반영",true);
      },(error)=>{
        console.error("Firebase realtime read failed",error);
        setRealtimeStatus("실시간 읽기 실패: "+(error&&error.code?error.code:"오류"),false);
      });
    }catch(error){
      console.error("Firebase init failed",error);
      setRealtimeStatus("실시간 연결 실패: "+(error&&error.message?error.message:"오류"),false);
    }
  }

  function pushRealtimeNow(reason="auto",delayMs=0){
    if(applyingRemoteData)return;

    /* Firebase가 아직 준비되지 않았을 때 조용히 return 하면
       화면/로컬스토리지만 저장되고 새로고침 시 원복되는 문제가 생긴다.
       그래서 저장 대기 표시 후 연결 즉시 자동 재저장한다. */
    if(!firebaseReady || !firebaseRef){
      firebaseWritePending = true;
      firebaseWritePendingReason = reason || "pending-not-ready";
      setRealtimeStatus("Firebase 저장 대기중",false);
      return;
    }

    clearTimeout(firebaseSaveTimer);
    firebaseSaveTimer=setTimeout(()=>{
      try{
        const payload=buildFirebasePayload(reason);
        firebaseRef.set(payload).then(()=>{
          firebaseLastSaveAt = Date.now();
          firebaseWritePending = false;
          firebaseWritePendingReason = "";
          setRealtimeStatus("Firebase 저장 완료",true);
        }).catch((error)=>{
          console.error("Firebase realtime write failed",error);
          firebaseWritePending = true;
          firebaseWritePendingReason = reason || "pending-write-failed";
          setRealtimeStatus("Firebase 저장 실패: "+(error&&error.code?error.code:"오류"),false);
        });
      }catch(error){
        console.error("Firebase realtime push failed",error);
        firebaseWritePending = true;
        firebaseWritePendingReason = reason || "pending-push-error";
        setRealtimeStatus("Firebase 저장 오류",false);
      }
    },Number(delayMs)||0);
  }


  /* ===== bus-seat 가입승인 회원 → 멤버리스트 자동 등록 =====
     bus-seat 파일에서 승인 버튼을 누르면 busSeatApp DB의 memberList/joinCodes/{회원번호}에
     승인 회원 정보가 저장된다. 이 멤버리스트 파일은 해당 경로를 감시해 열 구조에 맞춰 자동 등록한다. */
  const BUS_SEAT_MEMBER_SOURCE_CONFIG = {
    apiKey: "AIzaSyBH3866EIMkhI--ms4xAZ7k7XS9sQFvgwQ",
    authDomain: "bus-seat-eb86c.firebaseapp.com",
    databaseURL: "https://bus-seat-eb86c-default-rtdb.asia-southeast1.firebasedatabase.app",
    projectId: "bus-seat-eb86c",
    storageBucket: "bus-seat-eb86c.firebasestorage.app",

    appId: "1:132111967366:web:e034a00f8c8cc4aa441d07"
  };
  const BUS_SEAT_APPROVED_JOIN_PATH = "memberList/joinCodes";
  const MEMBER_LIST_DELETED_JOIN_PATH = "memberList/deletedJoinCodes";
  /* 현재 멤버리스트 데이터 통일 기준
     - 과거 joinCodes 승인자료가 새로고침 때 삭제 회원을 되살리는 것을 막기 위해
       이 파일을 적용한 시점의 멤버리스트를 기준 원본으로 고정한다.
     - 기준시각 이후의 새 가입 승인만 멤버리스트에 병합한다. */
  const MEMBER_LIST_CURRENT_MASTER_PATH = "memberList/currentDataMaster/v20260601";
  let currentMasterCutoffAt = 0;
  let currentMasterReady = false;
  let deletedJoinCodeMap = {};
  let deletedJoinMarkerReady = false;
  let busSeatMemberSourceReady = false;
  let busSeatMemberSourceRef = null;

  function getApprovedJoinTime(member){
    return Number(member?.approvedAt || member?.updatedAt || member?.createdAt || member?.joinApprovedAt || 0);
  }

  function isOldJoinCodeBeforeCurrentMaster(member){
    if(!currentMasterReady || !currentMasterCutoffAt) return false;
    const t = getApprovedJoinTime(member);
    // 승인시간이 없거나 기준시각 이전이면 과거 승인자료로 보고 자동 병합하지 않는다.
    return !t || t <= currentMasterCutoffAt;
  }

  function ensureCurrentMasterBaseline(){
    if(!firebaseDb || currentMasterReady) return Promise.resolve();
    const ref = firebaseDb.ref(MEMBER_LIST_CURRENT_MASTER_PATH);
    return ref.once("value").then(snap=>{
      const val = snap.exists() ? snap.val() : null;
      const cutoff = Number(val && val.cutoffAt || 0);
      if(cutoff){
        currentMasterCutoffAt = cutoff;
        currentMasterReady = true;
        syncDeletedStatusRowsToTombstone("current-master-existing-deleted");
        setStatus("현재 멤버리스트 기준 데이터 사용중");
        flushPendingBusSeatApprovedMemberSync();
        return;
      }
      currentMasterCutoffAt = Date.now();
      currentMasterReady = true;
      const payload = {
        mode:"current-member-list-is-master",
        cutoffAt:currentMasterCutoffAt,
        cutoffAtISO:new Date(currentMasterCutoffAt).toISOString(),
        note:"이 시각 이전 joinCodes 승인자료는 과거자료로 보고 자동 재등록하지 않음",
        clientId:CLIENT_ID
      };
      return ref.set(payload).then(()=>{
        syncDeletedStatusRowsToTombstone("current-master-created-deleted");
        setStatus("현재 멤버리스트를 기준 데이터로 통일했습니다");
        flushPendingBusSeatApprovedMemberSync();
      });
    }).catch(err=>{
      console.warn("Current master baseline init failed", err);
      // 기준값 저장 실패 시 안전상 과거 joinCodes 병합을 막는다.
      currentMasterCutoffAt = Date.now();

      syncDeletedStatusRowsToTombstone("current-master-fallback-deleted");

  function normalizeIncomingPhone344(value){

  function formatMemberJoinDate(ms){

  function busSeatJoinResultLabel(member){
    const status=String(member?.status||"").trim();
    const approvalResult=String(member?.approvalResult||"").trim();
    const joinStatus=String(member?.joinStatus||"").trim();
    const approvalText=String(member?.approval||member?.result||member?.statusText||"").trim();
    const approvedAt=Number(member?.approvedAt||0);
    const approvalSignals=[status, approvalResult, joinStatus, approvalText].map(v=>String(v||"").trim());

    /* 재가입 승인 최종 보정
       이 파일이 감시하는 bus-seat 경로(memberList/joinCodes)는 "승인된 가입코드" 목록이다.
       따라서 과거 멤버리스트의 approvalResult="삭제" 값이 joinCodes 데이터에 같이 남아 있어도
       명시적인 차단/탈퇴/거절 신호가 없으면 승인으로 처리해야 한다.
       기존 삭제 회원이 다시 가입 승인될 때 "삭제"가 재등록되는 문제를 여기서 차단한다. */
    const hasBlockedSignal = approvalSignals.some(v=>["blocked","차단"].includes(v));
    const hasWithdrawnSignal = approvalSignals.some(v=>["withdrawn","탈퇴"].includes(v));
    const hasRejectedSignal = approvalSignals.some(v=>["rejected","거절"].includes(v));
    const hasPendingSignal = approvalSignals.some(v=>["pending","가입대기"].includes(v));

    if(hasBlockedSignal) return "차단";
    if(hasWithdrawnSignal) return "탈퇴";
    if(hasRejectedSignal) return "거절";
    if(hasPendingSignal) return "가입대기";

    const hasApprovedSignal =
      member?.__fromApprovedJoinCodes === true ||
      member?.approved === true ||
      approvedAt > 0 ||
      approvalSignals.some(v=>["승인","관리자","active","approved","approve","approval","완료","승인완료"].includes(v));

    if(hasApprovedSignal){
      return member?.adminAccess || approvalSignals.includes("관리자") ? "관리자" : "승인";
    }

    // joinCodes가 아닌 다른 출처에서만 삭제 신호를 삭제로 인정한다.
    if(!member?.__fromApprovedJoinCodes && approvalSignals.some(v=>["deleted","삭제"].includes(v))) return "삭제";

    const direct=approvalResult || joinStatus || approvalText;
    return direct || "가입대기";
  }

  /* 영구 삭제 방지 기준

     - 행삭제 버튼으로 제거한 경우뿐 아니라, 삭제 상태가 저장된 기존 자료도 새로고침 때 되살아나지 않는다.

  function buildDeletedMarkerFromRow(row, reason){
    if(!row) return null;
    const nameIdx=getHeaderIndex("이 름",1);
    const phoneIdx=getHeaderIndex("연락처",5);

    if(!name && !phone && !code) return null;
    const codeKey=code ? makeDeletedJoinKey("code:"+code) : "";
    const identityKey=makeDeletedJoinKey(makeDeletedIdentityKey(name,phone));
    const old=(codeKey && deletedJoinCodeMap && deletedJoinCodeMap[codeKey]) ||
              (identityKey && deletedJoinCodeMap && deletedJoinCodeMap[identityKey]) || null;
    const deletedAt=Number(old && old.deletedAt || 0) || Date.now();
    return {deletedAt, deletedAtISO:new Date(deletedAt).toISOString(), name, phone, code, reason:reason||"deleted-status-row"};

  function syncDeletedStatusRowsToTombstone(reason="scan-deleted-status"){

        if(marker.name || marker.phone) updates[makeDeletedJoinKey(makeDeletedIdentityKey(marker.name,marker.phone))] = marker;
      });
      const keys=Object.keys(updates);
      if(!keys.length) return;
      keys.forEach(k=>{ deletedJoinCodeMap[k]=updates[k]; });
      firebaseDb.ref(MEMBER_LIST_DELETED_JOIN_PATH).update(updates).catch(e=>{
        console.warn("Deleted status tombstone sync failed", e);

  }

  function findRowBySameNameAndPhone(name,phone){
    const nameKey=normalizeCompareText(name);

    if(!nameKey || !phoneKey) return null;

    return rowsArray().slice(1).find(row=>{

  function findRowByRejoinIdentity(name,phone,birthYear,dong){
    const nameKey=normalizeCompareText(name);
    if(!nameKey) return null;
    const phoneKey=normalizeComparePhone(phone);
    const birthKey=normalizeCompareText(birthYear);
    const dongKey=normalizeCompareText(dong);
    const nameIdx=getHeaderIndex("이 름",1);
    const phoneIdx=getHeaderIndex("연락처",5);
    const birthIdx=getHeaderIndex("출생년도",3);
    const dongIdx=getHeaderIndex("거주지",8);
    const resultIdx=getHeaderIndex("승인결과",22);
    const rows=rowsArray().slice(1);

    // 1순위: 이름+전화번호 완전 일치. 삭제 상태여도 같은 행을 복구한다.
    let row=rows.find(r=>{
      return normalizeCompareText(getCellPlain(r,nameIdx))===nameKey &&
             phoneKey && normalizeComparePhone(getCellPlain(r,phoneIdx))===phoneKey;
    });
    if(row) return row;

    // 2순위: 이전에 삭제된 행 중 이름+출생년도+거주지가 일치하면 재가입 복구 대상으로 본다.
    row=rows.find(r=>{
      const result=normalizeCompareText(getCellPlain(r,resultIdx));
      if(result!=="삭제") return false;
      if(normalizeCompareText(getCellPlain(r,nameIdx))!==nameKey) return false;
      const birthOk = !birthKey || normalizeCompareText(getCellPlain(r,birthIdx))===birthKey;
      const dongOk = !dongKey || normalizeCompareText(getCellPlain(r,dongIdx))===dongKey;
      return birthOk && dongOk;
    });
    if(row) return row;

    // 3순위: 삭제된 동일 이름 행이 하나뿐이면 그 행을 복구한다.
    const deletedSameNameRows=rows.filter(r=>{
      return normalizeCompareText(getCellPlain(r,resultIdx))==="삭제" &&
             normalizeCompareText(getCellPlain(r,nameIdx))===nameKey;
    });
    if(deletedSameNameRows.length===1) return deletedSameNameRows[0];

    return null;
  }
  function isMostlyEmptyOrSameMemberRow(row,name,phone){

    const nameKey=normalizeCompareText(name);
    const phoneKey=normalizeComparePhone(phone);

    if(phoneKey && rowPhone && rowPhone===phoneKey) return true;
    return false;
  }

  function applyBusSeatApprovedMemberToTable(member){
    if(!member || !member.code) return false;

    const code=String(member.code||"").trim();
    if(!code) return false;

    // 현재 멤버리스트를 기준 원본으로 통일한 뒤에는
    // 기준시각 이전의 과거 joinCodes 승인자료가 삭제 회원을 다시 만들지 못하게 차단한다.
    if(member?.__fromApprovedJoinCodes && isOldJoinCodeBeforeCurrentMaster(member)){
      return false;
    }

    const idx={
      name:getHeaderIndex("이 름",1),
      gender:getHeaderIndex("성별",2),
      birth:getHeaderIndex("출생년도",3),
      phone:getHeaderIndex("연락처",5),
      dong:getHeaderIndex("거주지",8),
      approval:getHeaderIndex("가입:승인",19),
      uid:getHeaderIndex("회원UID",20),
      joinDate:getHeaderIndex("가입일",21),
      result:getHeaderIndex("승인결과",22)
    };

    const incomingName=String(member.name||"").trim();
    const incomingPhone=normalizeIncomingPhone344(member.phone||member.phoneDigits||"");

    /* 수동 삭제한 회원이 새로고침 때 다시 살아나는 원인:
       memberList/main에서는 행이 삭제되어도 bus-seat 승인 목록(memberList/joinCodes)에
       예전 승인 코드가 남아 있어 새로고침 시 다시 등록된다.
       삭제 시점 이후의 새 승인만 다시 살리고, 예전 승인 데이터는 건너뛴다. */
    const deletedMarker=getDeletedJoinMarker(code,incomingName,incomingPhone);
    if(deletedMarker && !isApprovalNewerThanDeleted(member,deletedMarker)){
      return false;
    }
    // 새 승인일이 삭제일보다 최신이면 정상 재가입으로 보고 tombstone 차단을 통과시킨다.

    const joinDate=formatMemberJoinDate(member.approvedAt||member.createdAt||member.updatedAt);
    const resultLabel=busSeatJoinResultLabel(member);
    const isDeletedRecord = resultLabel === "삭제";

    /* 등록 기준
       1) 이름+전화번호가 모두 기존 자료와 같으면 동일인으로 판단한다.
          이때 기존 이름/성별/출생년도/연락처/거주지는 건드리지 않고
          가입:승인, 회원UID, 가입일만 보강한다.
       2) 이름이 신규이거나 전화번호가 기존 자료와 다르면 새 행으로 등록한다.
       3) 이미 같은 회원UID가 있으면 중복 등록하지 않고 가입정보만 갱신한다. */
    const rowByCode=findRowByMemberCode(code);
    const rowByIdentity=findRowByRejoinIdentity(incomingName,incomingPhone,member.birthYear,member.dong);

    // 재가입 승인에서는 기존 삭제 행/동일인 행을 우선 복구한다.
    // 새 회원UID(A03 등)로 별도 행이 이미 생겨도 기존 동일인 행에 UID를 갱신하고 중복 승인 칸은 비운다.
    let row=rowByIdentity || rowByCode;
    let metadataOnly=false;

    if(rowByIdentity && rowByCode && rowByIdentity!==rowByCode && isMostlyEmptyOrSameMemberRow(rowByCode,incomingName,incomingPhone)){
      clearApprovalDuplicateRow(rowByCode);
    }

    // 삭제 상태는 joinCodes 승인 경로에서는 원칙적으로 들어오지 않아야 한다.
    // 혹시 다른 출처의 삭제 신호라면 기존 행만 삭제로 갱신하고 신규 생성은 하지 않는다.
    if(isDeletedRecord && !row){
      return false;
    }

    const isNew=!row;
    if(!row){
      row=findFirstEmptyMemberRow();
      if(!row){
        ensureMemberListRowCount(rowsArray().length+1);
        row=rowsArray()[rowsArray().length-1];
      }
    }

    if(!metadataOnly){
      setCellPlain(row,idx.name,incomingName);
      setCellPlain(row,idx.gender,member.gender||"");
      setCellPlain(row,idx.birth,member.birthYear||"");
      setCellPlain(row,idx.phone,incomingPhone);
      setCellPlain(row,idx.dong,member.dong||"");
    }
    // 상태 표시는 최종적으로 "승인결과" 칸에 기록한다.
    // 가입:승인 칸은 승인/관리자 상태의 호환 표시용으로만 사용한다.
    setCellPlain(row,idx.approval,resultLabel === "승인" || resultLabel === "관리자" ? "승인" : "");
    setCellPlain(row,idx.uid,code);
    setCellPlain(row,idx.joinDate,joinDate);
    setCellPlain(row,idx.result,resultLabel);
    return isNew || metadataOnly;
  }

  async function pruneJoinCodesMissingFromCurrentMemberNames(targetDb,currentNameSet){
    if(!targetDb || !currentNameSet || !currentNameSet.size) return 0;
    const snap=await targetDb.ref(BUS_SEAT_APPROVED_JOIN_PATH).once("value");
    const oldMap=snap.exists() ? (snap.val() || {}) : {};
    const updates={};
    Object.keys(oldMap).forEach(code=>{

  /* 회원관리(bus-seat) ↔ 멤버리스트 승인정보 동기화
     - 현재 회원관리 파일이 member-b458f를 쓰는 경우와 과거 bus-seat-eb86c를 쓰는 경우를 모두 감시한다.
     - 두 경로 중 어느 쪽에 승인 데이터가 있어도 멤버리스트에 병합한다.
     - 메인 회원명부 저장 경로(memberList/main)는 그대로 유지한다. */
  let latestApprovedJoinMaps = {};
  function mergeApprovedJoinCodeMaps(){
    const merged = {};
    Object.keys(latestApprovedJoinMaps).forEach(sourceKey=>{
      const map = latestApprovedJoinMaps[sourceKey];
      if(!map || typeof map !== "object") return;
      Object.keys(map).forEach(code=>{
        const member = map[code] || {};
        const finalCode = String(member.code || code || "").trim();
        if(!finalCode) return;
        // 같은 코드가 양쪽 DB에 있으면 더 최근 updatedAt/approvedAt/createdAt 값을 우선한다.
        const prev = merged[finalCode];
        const prevTime = Number(prev?.updatedAt || prev?.approvedAt || prev?.createdAt || 0);
        const nextTime = Number(member?.updatedAt || member?.approvedAt || member?.createdAt || 0);
        if(!prev || nextTime >= prevTime){
          merged[finalCode] = {...member, code: finalCode, __sourceKey: sourceKey};
        }
      });
    });
    return merged;
  }
  function handleApprovedJoinSnapshot(sourceKey, snap){
    const value = snap && snap.exists && snap.exists() ? (snap.val() || {}) : {};
    latestApprovedJoinMaps[sourceKey] = value;
    const merged = mergeApprovedJoinCodeMaps();
    const count = Object.keys(merged).length;
    if(!count){
      setStatus(sourceKey + " 승인정보 없음");
      return;
    }
    if(!firebaseInitialLoaded || !currentMasterReady || !deletedJoinMarkerReady){
      pendingBusSeatJoinCodeMap = merged;
      setStatus("현재 기준/삭제기록 확정 후 새 가입정보만 병합 대기");
      return;
    }
    syncApprovedMembersFromBusSeat(merged);
  }
  function attachApprovedJoinListener(sourceKey, db){
    if(!db) return false;
    const ref = db.ref(BUS_SEAT_APPROVED_JOIN_PATH);
    ref.on("value", snap=>handleApprovedJoinSnapshot(sourceKey, snap), error=>{
      console.error(sourceKey + " 승인 회원 읽기 실패", error);
      setStatus(sourceKey + " 승인 회원 읽기 실패");
    });
    return true;
  }

  function rowsArray(){return Array.from(table.tBodies[0]?.rows||[])}
  function cellText(cell){return String(cell?.innerText||"").trim()}
  function normalize(v){return String(v||"").trim().toLowerCase().replace(/\s+/g,"")}
  function safeJsonParse(raw){try{return JSON.parse(raw)}catch(e){return null}}
  function plainTextFromHtml(v){const d=document.createElement("div"); d.innerHTML=String(v??""); return d.innerText.trim()}
  function isCellObj(c){return c&&typeof c==="object"&&(Object.prototype.hasOwnProperty.call(c,"html")||Object.prototype.hasOwnProperty.call(c,"v")||Object.prototype.hasOwnProperty.call(c,"text"))}
  function normalizeCell(c,rIdx){
    if(isCellObj(c)) return {html:String(c.html??c.v??c.text??""),tag:c.tag||((rIdx===0)?"th":"td"),className:c.className||((rIdx===0)?"header-cell":""),style:c.style||"font-size:12px;text-align:center;vertical-align:middle;white-space:nowrap;overflow-wrap:normal;word-break:keep-all;"};
    return {html:String(c??""),tag:(rIdx===0)?"th":"td",className:(rIdx===0)?"header-cell":"",style:"font-size:12px;text-align:center;vertical-align:middle;white-space:nowrap;overflow-wrap:normal;word-break:keep-all;"};
  }
  function normalizeData(raw){
    if(!raw) return null;
    let data=raw;
    if(Array.isArray(data)) data={rows:data};
    if(data.data&&Array.isArray(data.data)) data={rows:data.data};
    if(data.table&&Array.isArray(data.table)) data={rows:data.table};
    if(!data.rows||!Array.isArray(data.rows)) return null;
    let rows=data.rows.filter(r=>Array.isArray(r)).map((row,rIdx)=>row.map(c=>normalizeCell(c,rIdx)));
    if(!rows.length) return null;

    // 예전 파일의 1, 2행(총회원수/검색줄)이 저장되어 있으면 자동 제거
    if(rows.length>=3){
      const r0=normalize(rows[0].map(c=>plainTextFromHtml(c.html)).join(" "));
      const r1=normalize(rows[1].map(c=>plainTextFromHtml(c.html)).join(" "));
      const r2=normalize(rows[2].map(c=>plainTextFromHtml(c.html)).join(" "));
      if((r0.includes("총회원수")||r0.includes("회원수")) && (r1.includes("이름검색")||r1.includes("닉네임검색")) && (r2.includes("이름")||r2.includes("닉네임"))){
        rows=rows.slice(2);
      }
    }

    // 제목행이 없으면 제목행을 강제로 붙여 기존 데이터가 사라지지 않게 함
    const firstText=normalize(rows[0].map(c=>plainTextFromHtml(c.html)).join(" "));
    if(!(firstText.includes("이름")&&firstText.includes("닉네임"))){
      rows.unshift(headers.map(h=>({html:h,tag:"th",className:"header-cell",style:"font-weight:700;font-size:12px;text-align:center;vertical-align:middle;white-space:nowrap;overflow-wrap:normal;word-break:keep-all;"})));
    }

    let cols=Array.isArray(data.cols)&&data.cols.length?data.cols.slice():colWidths.map(w=>`width:${w}px`);

    // 보안/중복 열 정리: 비밀번호는 member-list에 저장하지 않으며,
    // 연락처/거주지는 기존 열을 그대로 사용한다.
    const headerRow=rows[0];
    const obsoleteIndexes=[];
    headerRow.forEach((cell,idx)=>{
      const label=normalize(plainTextFromHtml(cell.html));
      if(obsoleteApprovalHeaders.some(name=>normalize(name)===label)) obsoleteIndexes.push(idx);
    });
    obsoleteIndexes.sort((a,b)=>b-a).forEach(idx=>{
      rows.forEach(row=>{ if(idx<row.length) row.splice(idx,1); });
      if(idx<cols.length) cols.splice(idx,1);
    });

    // 회원가입/승인 관리용 기본 열 보강
    // 기존 저장 데이터나 Firebase 데이터에 새 열이 없을 경우 자동으로 뒤쪽에 추가한다.
    const headerStyle="font-weight:700;font-size:12px;text-align:center;vertical-align:middle;white-space:nowrap;overflow-wrap:normal;word-break:keep-all;";
    approvalHeaders.forEach((headerLabel,idx)=>{
      const exists=headerRow.some(cell=>normalize(plainTextFromHtml(cell.html))===normalize(headerLabel));
      if(exists) return;
      headerRow.push({html:headerLabel,tag:"th",className:"header-cell",style:headerStyle});
      for(let r=1;r<rows.length;r++){
        rows[r].push(makeCell(""));
      }
      cols.push(`width:${approvalColWidths[idx]}px`);
    });

    const maxLen=Math.max(...rows.map(row=>row.length), cols.length);
    while(cols.length<maxLen){
      const width=colWidths[cols.length]||94;
      cols.push(`width:${width}px`);
    }
    rows.forEach((row,rIdx)=>{
      while(row.length<maxLen){
        row.push(rIdx===0
          ? {html:headers[row.length]||"",tag:"th",className:"header-cell",style:headerStyle}
          : makeCell("")
        );
      }
    });

    return {cols,rows};
  }
  function dataScore(data){

    let score=0;
    data.rows.forEach((row,r)=>row.forEach(cell=>{const t=plainTextFromHtml(cell.html); if(t) score+=(r===0?1:3)}));
    return score+data.rows.length;
  }

    for(let i=0;i<localStorage.length;i++){

  function getColumnFilterValues(colIdx){

  function positionExcelFilterPopup(th, popup){
    const rect = th.getBoundingClientRect();
    popup.hidden = false;
    popup.style.display = "block";
    const popupWidth = popup.offsetWidth || 160;
    const popupHeight = popup.offsetHeight || 260;
    let left = rect.left;
    let top = rect.bottom + 2;
    if(left + popupWidth > window.innerWidth - 4){
      left = window.innerWidth - popupWidth - 4;
    }
    if(left < 4) left = 4;
    const minTop = rect.bottom + 2;
    if(top + popupHeight > window.innerHeight - 4){
      const tryTop = window.innerHeight - popupHeight - 4;
      top = Math.max(minTop, tryTop);
    }
    popup.style.left = left + "px";

  function memberRecordMatchesTarget(value,key,target){
    const v=(value && typeof value==="object") ? value : {};
    const keyText=String(key||"");
    const targetCode=String(target.code||"").trim();
    const targetName=normalizeCompareText(target.name);
    const targetPhone=normalizeComparePhone(target.phone);
    const names=[v.name,v.realName,v.memberName,v.idName,v.displayName,v.userName,v.username,v.id].map(normalizeCompareText).filter(Boolean);
    const phones=[v.phone,v.phoneDigits,v.tel,v.mobile,v.contact,v.contactPhone].map(normalizeComparePhone).filter(Boolean);
    const codes=[v.code,v.joinCode,v.memberCode,v.uid,v.memberUid,v.userUid,v.authUid].map(x=>String(x||"").trim()).filter(Boolean);
    if(targetCode && (keyText===targetCode || codes.includes(targetCode))) return true;
    if(targetPhone){
      const phoneHit=phones.includes(targetPhone) || keyText.includes(targetPhone);
      const nameHit=!targetName || names.includes(targetName) || normalizeCompareText(keyText).includes(targetName);
      return phoneHit && nameHit;
    }
    if(targetName && targetCode){
      return names.includes(targetName) && (keyText.includes(targetCode) || codes.includes(targetCode));
    }
    return false;
  }

  function collectNestedRemovalUpdates(basePath,value,target,updates){
    if(!value || typeof value!=="object") return 0;
    let count=0;
    Object.keys(value).forEach(key=>{
      const child=value[key];
      const childPath=basePath ? basePath+"/"+key : key;
      if(memberRecordMatchesTarget(child,key,target)){
        updates[childPath]=null;
        count++;
        return;
      }
      if(child && typeof child==="object" && !Array.isArray(child)){
        const keys=Object.keys(child);
        const looksNested = keys.some(k=>{
          const v=child[k];
          return v && typeof v==="object" && (v.code || v.name || v.phone || v.memberCode || v.joinCode || v.deviceId);
        });
        if(looksNested){
          count += collectNestedRemovalUpdates(childPath,child,target,updates);
        }
      }
    });
    return count;
  }

  async function removeMatchingChildrenByTarget(db,path,target,stats,label){
    if(!db) return;
    try{
      const snap=await db.ref(path).once("value");
      const map=snap.exists() ? (snap.val() || {}) : {};
      if(!map || typeof map!=="object") return;
      const updates={};
      const count=collectNestedRemovalUpdates("",map,target,updates);
      if(count){
        await db.ref(path).update(updates);
        stats.removed += count;
        stats.details.push(label+"/"+path+" "+count+"건");
      }
    }catch(e){
      stats.errors.push(label+"/"+path+": "+(e && e.code ? e.code : (e && e.message ? e.message : "오류")));
    }
  }

  function buildExactCleanupUpdates(target,marker){
    const updates={};
    const code=String(target.code||"").trim();
    const nameKey=makeIndexNameKeyForCleanup(target.name);
    const roots=[
      "membershipSecure",
      "busSeatApp/membership",
      "membership"
    ];
    const rootStylePaths=[
      {members:"members",pending:"pending",nameIndex:"nameIndex"},
      {members:"busSeatApp/members",pending:"busSeatApp/pending",nameIndex:"busSeatApp/nameIndex"}
    ];
    if(code){
      updates[BUS_SEAT_APPROVED_JOIN_PATH+"/"+code]=null;
      updates[MEMBER_LIST_DELETED_JOIN_PATH+"/"+code]=marker;
      roots.forEach(root=>{
        updates[root+"/members/"+code]=null;
        updates[root+"/pending/"+code]=null;
        updates[root+"/activeSessions/"+code]=null;
        if(nameKey){
          updates[root+"/nameIndex/"+nameKey+"/"+code]=null;
          updates[root+"/loginIndex/"+nameKey+"/"+code]=null;
        }
      });
      rootStylePaths.forEach(paths=>{
        updates[paths.members+"/"+code]=null;
        updates[paths.pending+"/"+code]=null;
        if(nameKey) updates[paths.nameIndex+"/"+nameKey+"/"+code]=null;
      });
      updates["activeSessions/"+code]=null;
      if(nameKey) updates["loginIndex/"+nameKey+"/"+code]=null;
    }
    if(marker.code) updates[MEMBER_LIST_DELETED_JOIN_PATH+"/"+makeDeletedJoinKey("code:"+marker.code)] = marker;
    if(marker.name || marker.phone) updates[MEMBER_LIST_DELETED_JOIN_PATH+"/"+makeDeletedJoinKey(makeDeletedIdentityKey(marker.name,marker.phone))] = marker;
    return updates;
  }

  function deleteCol(){if(blockReadOnlyAction())return;if(!selectedCell)return alert("삭제할 열의 칸을 선택하세요."); const idx=selectedCell.cellIndex; rowsArray().forEach(tr=>{if(tr.cells[idx])tr.cells[idx].remove()}); const col=table.querySelectorAll("col")[idx]; if(col)col.remove(); selectedCell=null; selectedCells.clear(); refreshHeaderFiltersSoon(); autoSave(); scheduleScaleWholeTable()}
  function selectCurrentRow(){
    if(blockReadOnlyAction())return;

      alert('행 전체를 선택할 칸을 먼저 클릭하세요.');

    }

    }

  function getSelectedEditableCells(){
    const cells=Array.from(selectedCells).filter(cell=>cell && cell.isConnected && cell.tagName && cell.tagName.toLowerCase()==="td");
    if(cells.length) return cells;
    return selectedCell && selectedCell.isConnected && selectedCell.tagName && selectedCell.tagName.toLowerCase()==="td" ? [selectedCell] : [];
  }
  function afterCellContentChanged(message, realtimeReason){
    updateTotalCount();
    refreshHeaderFiltersSoon();
    autoSave();
    if(!applyingRemoteData) pushRealtimeNow(realtimeReason||"cell-content-change",0);
    scheduleScaleWholeTable();
    setStatus(message||"셀 내용이 변경되었습니다");
  }
  function clearSelectedCellContents(){
    if(blockReadOnlyAction())return;
    const cells=getSelectedEditableCells();
    if(!cells.length){alert("내용을 삭제할 셀을 먼저 선택하세요.");return;}
    cells.forEach(cell=>{cell.innerHTML="";});
    afterCellContentChanged("선택 셀 내용 삭제 완료","cell-content-clear");
  }
  function getSelectedCellsAsText(){
    const cells=getSelectedEditableCells();
    if(!cells.length)return "";
    const rowMap=new Map();
    cells.forEach(cell=>{
      const rowIndex=cell.parentElement.rowIndex;
      if(!rowMap.has(rowIndex))rowMap.set(rowIndex,[]);
      rowMap.get(rowIndex).push(cell);
    });
    return Array.from(rowMap.keys()).sort((a,b)=>a-b).map(rowIndex=>{
      return rowMap.get(rowIndex).sort((a,b)=>a.cellIndex-b.cellIndex).map(cell=>cell.innerText.replace(/\u00a0/g," ").trim()).join("\t");
    }).join("\n");
  }
  async function copySelectedCellContents(){
    const text=getSelectedCellsAsText();
    if(!text){alert("복사할 셀을 먼저 선택하세요.");return;}
    try{
      await navigator.clipboard.writeText(text);
      setStatus("선택 셀 내용 복사 완료");
    }catch(e){
      const ta=document.createElement("textarea");
      ta.value=text;
      ta.style.position="fixed";
      ta.style.left="-9999px";
      document.body.appendChild(ta);
      ta.select();
      try{document.execCommand("copy");setStatus("선택 셀 내용 복사 완료");}catch(err){alert("브라우저 권한 때문에 자동 복사에 실패했습니다. Ctrl+C를 사용하세요.");}
      ta.remove();
    }
  }
  function pasteTextToSelectedCell(text){
    if(blockReadOnlyAction())return;
    if(!selectedCell || !selectedCell.isConnected || selectedCell.tagName.toLowerCase()!=="td"){
      alert("붙여넣기 시작 셀을 먼저 선택하세요.");
      return;
    }
    const rows=String(text||"").replace(/\r\n/g,"\n").replace(/\r/g,"\n").split("\n");
    const startRow=selectedCell.parentElement.rowIndex;
    const startCol=selectedCell.cellIndex;
    rows.forEach((line,rOffset)=>{
      const tr=table.rows[startRow+rOffset];
      if(!tr)return;
      line.split("\t").forEach((value,cOffset)=>{
        const cell=tr.cells[startCol+cOffset];
        if(cell && cell.tagName.toLowerCase()==="td") cell.innerText=value;
      });
    });
    afterCellContentChanged("붙여넣기 완료","cell-content-paste");
  }
  async function pasteClipboardToSelectedCell(){
    if(blockReadOnlyAction())return;
    try{
      const text=await navigator.clipboard.readText();
      pasteTextToSelectedCell(text);
    }catch(e){
      alert("브라우저 권한 때문에 버튼 붙여넣기를 사용할 수 없습니다. 셀을 선택한 뒤 Ctrl+V를 사용하세요.");
    }
  }
  function bindCellContentButtons(){
    const clearBtn=document.getElementById("clearCellContentBtn");
    const copyBtn=document.getElementById("copyCellContentBtn");
    const pasteBtn=document.getElementById("pasteCellContentBtn");
    if(clearBtn)clearBtn.onclick=clearSelectedCellContents;
    if(copyBtn)copyBtn.onclick=copySelectedCellContents;
    if(pasteBtn)pasteBtn.onclick=pasteClipboardToSelectedCell;
    table.addEventListener("copy",e=>{
      const text=getSelectedCellsAsText();
      if(!text)return;
      e.preventDefault();
      e.clipboardData.setData("text/plain",text);
      setStatus("선택 셀 내용 복사 완료");
    });
    table.addEventListener("paste",e=>{
      if(blockReadOnlyAction())return;
      const text=e.clipboardData && e.clipboardData.getData("text/plain");
      if(!text)return;
      e.preventDefault();
      pasteTextToSelectedCell(text);
    });
    document.addEventListener("keydown",e=>{
      if(e.key!=="Delete" && e.key!=="Backspace")return;
      if(!selectedCell || isTableCellElement(document.activeElement))return;
      if(e.target && ["INPUT","TEXTAREA"].includes(e.target.tagName))return;
      e.preventDefault();
      clearSelectedCellContents();
    });
  }

  function normalizePhoneText(v){let t=String(v||"").trim(); if(!t)return""; const digits=t.replace(/\D/g,""); if(digits.length===8)return"010 "+digits.slice(0,4)+" "+digits.slice(4); if(digits.length===10&&digits.startsWith("10"))return"0"+digits.slice(0,2)+" "+digits.slice(2,6)+" "+digits.slice(6); if(digits.length===11)return digits.slice(0,3)+" "+digits.slice(3,7)+" "+digits.slice(7); return t}
  function getPhoneColumnIndexes(){return[5,6]}
  function scaleWholeTable(){
    /* 관리자 비밀번호 화면에서는 데이터 표 확대/축소를 실행하지 않음 */

  function backupDataJson(){if(blockReadOnlyAction())return;

      type:"member-list-table-data",
      version:"1.0",

    };
    const blob=new Blob([JSON.stringify(payload,null,2)],{type:"application/json;charset=utf-8"});

  function restoreDataJsonFile(file){
    if(blockReadOnlyAction())return;

    const reader=new FileReader();
    reader.onload=()=>{
      try{

        const data=normalizeData(raw);
        if(!data){alert("복구할 수 있는 회원명부 데이터가 아닙니다.");return;}

  function setCaretToEnd(el){
    try{
      el.focus();
      const range=document.createRange();

      sel.removeAllRanges();
      sel.addRange(range);
    }catch(e){}
  }
  function hideAutocomplete(){
    autocompleteBox.style.display="none";
    autocompleteBox.innerHTML="";
    autocompleteCell=null;
    autocompleteItems=[];
    autocompleteIndex=-1;
  }
  function getColumnAutocompleteItems(cell,query){
    if(!cell||cell.parentElement.rowIndex<1)return[];
    const col=cell.cellIndex;
    const q=normalize(query);
    if(!q)return[];
    const values=new Map();
    rowsArray().forEach((row,idx)=>{
      if(idx<1||row===cell.parentElement)return;
      const txt=cellText(row.cells[col]);
      if(!txt)return;
      const key=normalize(txt);
      if(!key||key===q)return;
      if(key.startsWith(q)||key.includes(q)) values.set(txt,txt);
    });
    return Array.from(values.values()).sort((a,b)=>String(a).localeCompare(String(b),"ko-KR",{sensitivity:"base",numeric:true})).slice(0,10);
  }
  function renderAutocomplete(){
    autocompleteBox.innerHTML=autocompleteItems.map((v,i)=>`<div class="autocomplete-item ${i===autocompleteIndex?'active':''}" data-index="${i}">${escapeHtml(v)}</div>`).join("");
    autocompleteBox.querySelectorAll(".autocomplete-item").forEach(item=>{
      item.onmousedown=e=>{e.preventDefault(); fillAutocomplete(autocompleteItems[Number(item.dataset.index)]);};
    });
  }
  function showAutocomplete(cell){
    if(!cell||cell.tagName.toLowerCase()!=="td"){hideAutocomplete();return;}

    if(!autocompleteItems.length){hideAutocomplete();return;}
    autocompleteCell=cell;
    autocompleteIndex=0;

    const rect=cell.getBoundingClientRect();
    autocompleteBox.style.left=Math.max(4,rect.left)+"px";
    autocompleteBox.style.top=Math.min(window.innerHeight-180,rect.bottom+2)+"px";
    autocompleteBox.style.minWidth=Math.max(120,rect.width)+"px";
    autocompleteBox.style.display="block";
  }
  function fillAutocomplete(value){
    if(!autocompleteCell||!value)return;
    autocompleteCell.innerText=value;
    setCaretToEnd(autocompleteCell);

    autoSave();
    scheduleScaleWholeTable();
  }
  function moveAutocomplete(delta){
    if(autocompleteBox.style.display==="none"||!autocompleteItems.length)return false;
    autocompleteIndex=(autocompleteIndex+delta+autocompleteItems.length)%autocompleteItems.length;
    renderAutocomplete();

  }

  table.addEventListener("pointerdown",e=>{
    const c=e.target.closest&&e.target.closest("td,th");
    if(!c)return;
    const isTouchPointer=(e.pointerType==="touch"||e.pointerType==="pen");
    if(!isTouchPointer && (e.ctrlKey || e.metaKey)){
      e.preventDefault();
      e.stopPropagation();
      cancelLongPressTimer();
      cancelTouchSelectTimer();
      toggleMultiSelectedCell(c);

      return;
    }
    touchMovedAsScroll=false;
    longPressStartX=e.clientX||0;
    longPressStartY=e.clientY||0;
    scheduleCellTouchSelection(c,!isTouchPointer);
    if(isTouchPointer) suppressNextTouchClickUntil=Date.now()+CELL_TOUCH_DELAY_MS+120;
    if(!isEditableBodyCell(c)){
      cancelLongPressTimer();
      return;
    }
    lockAllCellEditing(c);
    c.contentEditable="false";
    c.classList.remove("cell-editing");

    if(!isTouchPointer){
      longPressTimer=null;
      return;

      if(touchMovedAsScroll)return;
      cancelTouchSelectTimer();
      enableLongPressCellEditing(c);
      longPressTimer=null;
    },LONG_PRESS_EDIT_MS);
  },true);
  table.addEventListener("pointermove",e=>{
    if(!longPressTimer&&!touchSelectTimer)return;
    const dx=Math.abs((e.clientX||0)-longPressStartX);
    const dy=Math.abs((e.clientY||0)-longPressStartY);
    const isTouchPointer=(e.pointerType==="touch"||e.pointerType==="pen");
    if(isTouchPointer && (dx>TOUCH_SCROLL_MOVE_LIMIT || dy>TOUCH_SCROLL_MOVE_LIMIT)){
      touchMovedAsScroll=true;
      suppressNextTouchClickUntil=Date.now()+650;
      cancelLongPressTimer();
      cancelTouchSelectTimer();
      return;
    }
    if(dx>LONG_PRESS_MOVE_LIMIT || dy>LONG_PRESS_MOVE_LIMIT){
      cancelLongPressTimer();
      cancelTouchSelectTimer();
    }
  },true);
  table.addEventListener("pointerup",e=>{
    if(touchMovedAsScroll){
      suppressNextTouchClickUntil=Date.now()+650;
      cancelTouchSelectTimer();
    }
    cancelLongPressTimer();
    touchMovedAsScroll=false;
  },true);
  table.addEventListener("pointercancel",()=>{
    touchMovedAsScroll=false;
    cancelLongPressTimer();
    cancelTouchSelectTimer();
  },true);
  table.addEventListener("contextmenu",e=>{
    const c=e.target.closest&&e.target.closest("#memberTable td");

  /* PC 글자 편집: 더블클릭으로 편집 진입 */
  table.addEventListener("dblclick",e=>{
    const c=e.target.closest&&e.target.closest("#memberTable td");

    e.stopPropagation();

  table.addEventListener("focusin",e=>{
    const c=e.target.closest&&e.target.closest("td,th");

        clearSelectedCellBorders();

    finishCellEditingSoon();

  table.addEventListener("click",e=>{
    const c=e.target.closest&&e.target.closest("td,th");
    if(!c)return;
    if(e.ctrlKey || e.metaKey){
      e.preventDefault();
      e.stopPropagation();

    if(autocompleteBox.style.display!=="none"&&autocompleteItems.length){

      if(e.key==="Escape"){hideAutocomplete();return;}
    }

  table.addEventListener("input",e=>{
    if(blockReadOnlyAction()) return;
    const c=e.target.closest&&e.target.closest("td,th");
    updateTotalCount();
    refreshHeaderFiltersSoon();
    autoSave();
    scheduleScaleWholeTable();
    if(c)showAutocomplete(c);
  },true);
  table.addEventListener("blur",e=>{const c=e.target.closest&&e.target.closest("td,th"); if(!c)return; setTimeout(()=>{if(!autocompleteBox.matches(":hover"))hideAutocomplete();},120); if(!isReadOnlyMode() && getPhoneColumnIndexes().includes(c.cellIndex)){const old=c.innerText.trim(), next=normalizePhoneText(old); if(old!==next){c.innerText=next;autoSave();scheduleScaleWholeTable()}} if(!isReadOnlyMode() && c.tagName && c.tagName.toLowerCase()==="td"){ autoSave(); pushRealtimeNow("cell-blur-save",0); }},true);
  document.getElementById("sortBtn").onclick=()=>{if(blockReadOnlyAction())return;sortRowsByNameAsc(); search(); autoSave(); pushRealtimeNow("manual-sort"); setStatus("이름 가나다순 정렬 완료");}; document.getElementById("resetBtn").onclick=resetData; document.getElementById("dataBackupBtn").onclick=backupDataJson; document.getElementById("dataRestoreBtn").onclick=()=>{if(blockReadOnlyAction())return;document.getElementById("dataRestoreFile").click();}; document.getElementById("dataRestoreFile").onchange=e=>restoreDataJsonFile(e.target.files&&e.target.files[0]); const resetFirebaseJoinCodesBtn=document.getElementById("resetFirebaseJoinCodesBtn"); if(resetFirebaseJoinCodesBtn) resetFirebaseJoinCodesBtn.onclick=resetFirebaseAndJoinCodesToCurrentTable;  document.getElementById("addRowBtn").onclick=addRow; document.getElementById("delRowBtn").onclick=deleteRow; const deleteMemberInfoBtn=document.getElementById("deleteMemberInfoBtn"); if(deleteMemberInfoBtn) deleteMemberInfoBtn.onclick=deleteSelectedMemberInfo; document.getElementById("addColBtn").onclick=addCol; document.getElementById("delColBtn").onclick=deleteCol; document.getElementById("selectRowBtn").onclick=selectCurrentRow;
  document.getElementById("clearSearchBtn").onclick=()=>{document.getElementById("nameSearch").value="";document.getElementById("nickSearch").value=""; search()};
  bindCellContentButtons();
  bindCellStyleButtons();
  function handleOutsideClick(e){
    if(!autocompleteBox.contains(e.target)&&!e.target.closest("td,th"))hideAutocomplete();
  }
  document.addEventListener("click",handleOutsideClick);
  document.addEventListener("touchstart",handleOutsideClick,{passive:true});
  tableWrap.addEventListener("scroll",()=>{hideAutocomplete();});
  window.addEventListener("resize",()=>{hideAutocomplete();scheduleScaleWholeTable();}); window.addEventListener("orientationchange",()=>setTimeout(scaleWholeTable,300));
  applyData(loadBestSaved()||defaultData());

  initFirebaseRealtime();
  initBusSeatApprovedMemberSync();

  function bindToolbarButtonGroups(){
    const groups = [
      { button: document.getElementById("adminGroupToggleBtn"), panel: document.getElementById("adminButtonGroup") },
      { button: document.getElementById("editGroupToggleBtn"), panel: document.getElementById("editButtonGroup") }
    ];
    groups.forEach(({button, panel})=>{
      if(!button || !panel) return;
      button.addEventListener("click", ()=>{
        if(button.id === "adminGroupToggleBtn" && panel.hasAttribute("hidden")){
          if(typeof window.openAdminGroupWithPassword === "function"){
            window.openAdminGroupWithPassword();
          }else{
            window.dispatchEvent(new CustomEvent("request-admin-group-open"));
          }
          return;
        }
        const willOpen = panel.hasAttribute("hidden");
        groups.forEach(({button: otherButton, panel: otherPanel})=>{
          if(!otherButton || !otherPanel) return;
          otherPanel.setAttribute("hidden", "");
          otherButton.classList.remove("is-open");
          otherButton.setAttribute("aria-expanded", "false");
        });
        if(willOpen){
          panel.removeAttribute("hidden");
          button.classList.add("is-open");
          button.setAttribute("aria-expanded", "true");
        }
      });
    });
  }

  bindToolbarButtonGroups();

})();

  async function sha256(text){
    if(window.crypto && crypto.subtle){
      const data=new TextEncoder().encode(String(text));
      const hash=await crypto.subtle.digest("SHA-256",data);
      return Array.from(new Uint8Array(hash)).map(b=>b.toString(16).padStart(2,"0")).join("");
    }
    let h=0,s=String(text);
    for(let i=0;i<s.length;i++){h=((h<<5)-h)+s.charCodeAt(i);h|=0;}
    return "fallback-"+String(h);

  function applyModeButtons(mode){
    const readOnly=mode==="readonly";
    const status=$("statusText");
    if(status) status.textContent=readOnly ? "읽기전용" : "편집 가능";
    document.querySelectorAll("#memberTable td,#memberTable th").forEach(cell=>{
      cell.contentEditable="false";
      cell.classList.remove("cell-editing");
    });
  }

  function setUnlockedState(isUnlocked,mode="edit"){
    const isReadOnly=!!isUnlocked && mode==="readonly";
    setViewportLockedForAdmin(!isUnlocked);
    document.body.classList.toggle("locked",!isUnlocked);
    document.body.classList.toggle("unlocked",!!isUnlocked);
    document.body.classList.toggle("readonly-mode",isReadOnly);
    document.body.classList.toggle("edit-mode",!!isUnlocked && !isReadOnly);
    document.documentElement.classList.toggle("member-refresh-unlocked",!!isUnlocked);
    document.documentElement.classList.toggle("member-refresh-readonly",isReadOnly);
    if(isUnlocked){
      /* PC/모바일 새로고침 유지: 로그인/읽기전용 진입 상태를 저장해 새로고침 후 같은 화면으로 복귀합니다. */
      try{
        localStorage.setItem(SESSION_KEY,"1");
        localStorage.setItem(SESSION_MODE_KEY,isReadOnly?"readonly":"edit");
      }catch(e){}
      applyModeButtons(isReadOnly?"readonly":"edit");
      setTimeout(()=>window.dispatchEvent(new Event("resize")),80);
    }else{
      localStorage.removeItem(SESSION_KEY);
      localStorage.removeItem(SESSION_MODE_KEY);
      document.body.classList.remove("readonly-mode","edit-mode");
      setTimeout(()=>window.scrollTo(0,0),30);
    }
  }

  function forcePasswordGate(){
    localStorage.removeItem(SESSION_KEY);
    localStorage.removeItem(SESSION_MODE_KEY);
    setUnlockedState(false);
  }

  function restoreUnlockedSession(){
    try{
      const saved=localStorage.getItem(SESSION_KEY);
      const mode=localStorage.getItem(SESSION_MODE_KEY)||"edit";
      if(saved==="1"){
        setUnlockedState(true,mode==="readonly"?"readonly":"edit");
        return true;
      }
    }catch(e){}
    setUnlockedState(false);
    return false;
  }
  function makeRecoveryCode(){
    const chars="ABCDEFGHJKLMNPQRSTUVWXYZ23456789";
    const part=()=>Array.from({length:4},()=>chars[Math.floor(Math.random()*chars.length)]).join("");
    return [part(),part(),part(),part()].join("-");
  }
  function normalizeAdminPayload(value){
    if(!value)return null;
    if(typeof value==="string")return {passwordHash:value,recoveryHash:"",readOnlyHash:""};
    if(typeof value!=="object")return null;
    const passwordHash=String(value.passwordHash||value.passHash||value.adminPasswordHash||value.hash||"");
    const recoveryHash=String(value.recoveryHash||value.adminRecoveryHash||value.recoveryCodeHash||"");
    const readOnlyHash=String(value.readOnlyHash||value.readonlyHash||value.viewerHash||value.readOnlyPasswordHash||"");
    const systemAdminHash=String(value.systemAdminHash||value.systemPasswordHash||value.systemAdminPasswordHash||"");
    if(!passwordHash)return null;
    return {passwordHash,recoveryHash,readOnlyHash,systemAdminHash};
  }
  async function getDefaultHash(){return await sha256(DEFAULT_PASSWORD);}
  async function getDefaultReadOnlyHash(){return await sha256(DEFAULT_READONLY_PASSWORD);}
  async function loadLocalAdminCache(){
    // Firebase 우선: 로컬스토리지는 보조 캐시로만 사용합니다.
    // 로컬스토리지가 비어 있어도 기본 비밀번호를 새로 만들거나 Firebase에 덮어쓰지 않습니다.
    adminPasswordHash=localStorage.getItem(PASS_KEY)||"";
    adminRecoveryHash=localStorage.getItem(RECOVERY_KEY)||"";
    readOnlyPasswordHash=localStorage.getItem(READONLY_KEY)||"";
    systemAdminPasswordHash=localStorage.getItem(SYSTEM_ADMIN_KEY)||"";
  }
  function saveLocalAdminCache(){
    if(adminPasswordHash)localStorage.setItem(PASS_KEY,adminPasswordHash);
    if(adminRecoveryHash)localStorage.setItem(RECOVERY_KEY,adminRecoveryHash);
    else localStorage.removeItem(RECOVERY_KEY);
    if(readOnlyPasswordHash)localStorage.setItem(READONLY_KEY,readOnlyPasswordHash);
    if(systemAdminPasswordHash)localStorage.setItem(SYSTEM_ADMIN_KEY,systemAdminPasswordHash);
  }
  function buildAdminPayload(reason){
    return {
      type:"admin-password-sync",
      version:"member-list-readonly-1.0",
      source:"member-list",
      reason:reason||"update",
      passwordHash:adminPasswordHash,
      recoveryHash:adminRecoveryHash||"",
      readOnlyHash:readOnlyPasswordHash||"",
      systemAdminHash:systemAdminPasswordHash||adminPasswordHash||"",
      updatedAt:Date.now(),
      updatedAtISO:new Date().toISOString()
    };
  }
  function writeAdminSync(reason){
    saveLocalAdminCache();
    if(!adminReady||!adminRef)return;
    clearTimeout(adminWriteTimer);
    adminWriteTimer=setTimeout(()=>{
      adminRef.set(buildAdminPayload(reason)).then(()=>{
        setRealtimeBoxMsg("동기화 완료",true);
      }).catch((error)=>{
        console.error("Admin password sync write failed",error);
        setRealtimeBoxMsg("동기화 실패",false);
      });
    },120);
  }
  async function seedAdminSyncIfEmpty(){
    // Firebase에 비밀번호 노드가 없을 때만 1회 생성합니다.
    // 우선순위: 기존 로컬 캐시값 → 기본 초기값.
    // 한 번 Firebase에 생성된 뒤에는 로컬스토리지를 지워도 Firebase 값이 기준입니다.
    try{
      if(!adminPasswordHash) adminPasswordHash=await getDefaultHash();
      if(!readOnlyPasswordHash) readOnlyPasswordHash=await getDefaultReadOnlyHash();
      if(!systemAdminPasswordHash) systemAdminPasswordHash=adminPasswordHash;
      if(!adminRecoveryHash) adminRecoveryHash="";
      saveLocalAdminCache();
      if(adminRef){
        await adminRef.set(buildAdminPayload("firebase-empty-initial-seed"));
        setRealtimeBoxMsg("비밀번호 DB 생성완료",true);
        setGateMsg("Firebase 비밀번호 데이터가 없어 1회 생성했습니다.","#0b7a28");
      }
    }catch(error){
      console.error("Admin password initial seed failed",error);
      setRealtimeBoxMsg("비밀번호 DB 생성 실패",false);
      setGateMsg("Firebase 비밀번호 데이터 생성 실패. DB 권한을 확인하세요.","#b45309");
    }
  }
  async function initAdminFirebaseSync(){
    await loadLocalAdminCache();
    try{
      if(!window.firebase || !firebase.apps || !firebase.apps.length){
        adminRemoteLoaded=true;
        setGateMsg("Firebase 연결 전입니다. 로컬 캐시는 보조값으로만 사용합니다.","#b45309");
        return;
      }
      adminDb=firebase.database(firebase.apps[0]);
      adminRef=adminDb.ref(ADMIN_SYNC_PATH);
      adminReady=true;
      adminDb.ref(".info/connected").on("value",snap=>{
        if(snap.val()===true)setRealtimeBoxMsg("연결됨",true);
      });
      try{
        const currentSnap=await adminRef.once("value");
        if(!normalizeAdminPayload(currentSnap.val())){
          const legacySnap=await adminDb.ref(ADMIN_SYNC_LEGACY_PATH).once("value");
          const legacyPayload=normalizeAdminPayload(legacySnap.val());
          if(legacyPayload){
            await adminRef.set(Object.assign({}, legacySnap.val(), {migratedFrom:ADMIN_SYNC_LEGACY_PATH, migratedAt:Date.now(), migratedAtISO:new Date().toISOString()}));
            setRealtimeBoxMsg("비밀번호 경로 이전완료",true);
          }
        }
      }catch(migrateError){
        console.error("Admin password legacy migration failed",migrateError);
      }
      adminRef.on("value",async snap=>{
        const payload=normalizeAdminPayload(snap.val());
        if(!payload){
          adminRemoteLoaded=true;
          await seedAdminSyncIfEmpty();
          return;
        }
        // Firebase 값을 최우선으로 적용합니다. 로컬스토리지 값이 삭제/초기화되어도
        // 여기서 읽은 DB 값이 다시 로컬 캐시에 저장됩니다.
        adminPasswordHash=payload.passwordHash;
        adminRecoveryHash=payload.recoveryHash||"";
        readOnlyPasswordHash=payload.readOnlyHash||"";
        systemAdminPasswordHash=payload.systemAdminHash||"";
        saveLocalAdminCache();
        adminRemoteLoaded=true;
        setGateMsg("");
      },error=>{
        console.error("Admin password sync read failed",error);
        adminRemoteLoaded=true;
        setGateMsg("Firebase 비밀번호 읽기 실패. DB 연결/권한을 확인하세요.","#b45309");
      });
    }catch(error){
      console.error("Admin password sync init failed",error);
      adminRemoteLoaded=true;
      setGateMsg("Firebase 비밀번호 연결 실패. DB 설정을 확인하세요.","#b45309");
    }
  }
  async function ensureAdminReadyForLogin(){
    if(!adminRemoteLoaded){
      setGateMsg("Firebase 비밀번호 읽는 중입니다. 잠시 후 다시 눌러주세요.","#b45309");
      await new Promise(resolve=>setTimeout(resolve,350));
    }
    // 기본 비밀번호 자동 생성/자동 저장 금지.
    // Firebase에 값이 없거나 읽기 실패했을 때 임의로 1234/0000을 만들지 않습니다.
    if(!adminPasswordHash){
      setGateMsg("관리자 비밀번호를 Firebase에서 읽지 못했습니다.","#b45309");
      return false;
    }
    if(!readOnlyPasswordHash){
      setGateMsg("읽기전용 비밀번호를 Firebase에서 읽지 못했습니다.","#b45309");
      return false;
    }
    if(!systemAdminPasswordHash){
      systemAdminPasswordHash=adminPasswordHash;
      saveLocalAdminCache();
    }
    return true;
  }
  async function unlockWithPassword(){
    if(!(await ensureAdminReadyForLogin()))return;
    const input=$("adminPasswordInput");
    const value=(input&&input.value||"").trim();
    if(await sha256(value)===adminPasswordHash){
      setUnlockedState(true,"edit");
      if(input)input.value="";
      setGateMsg("");
    }else{
      setGateMsg("관리자가 아닌 경우. 읽기전용으로 로그인하세요.");
      if(input){input.select();input.focus();}
    }
  }
  async function unlockReadOnlyWithPassword(){
    if(!(await ensureAdminReadyForLogin()))return;
    const input=$("adminPasswordInput");
    const value=(input&&input.value||"").trim();
    if(await sha256(value)===readOnlyPasswordHash){
      setUnlockedState(true,"readonly");
      if(input)input.value="";
      setGateMsg("");
    }else{
      setGateMsg("읽기전용 비밀번호가 맞지 않습니다.");
      if(input){input.select();input.focus();}
    }
  }
  function resetViewToMinimumForLogin(){
    try{
      const viewport=document.querySelector('meta[name="viewport"]');
      if(viewport) viewport.setAttribute("content",LOCKED_VIEWPORT);
      const stage=document.getElementById("scaleStage");
      if(stage){stage.style.transform="none";stage.style.zoom="1";stage.style.width="";stage.style.height="auto";}
      const wrap=document.getElementById("tableWrap");
      if(wrap){wrap.scrollLeft=0;wrap.scrollTop=0;}
      document.documentElement.scrollLeft=0; document.documentElement.scrollTop=0;
      document.body.scrollLeft=0; document.body.scrollTop=0;
      window.scrollTo(0,0);
    }catch(e){}
  }
  function logout(){
    setUnlockedState(false);
    resetViewToMinimumForLogin();
    const input=$("adminPasswordInput");
    if(input)setTimeout(()=>{resetViewToMinimumForLogin();input.focus();},50);
  }
  async function changePassword(){
    if(!(await ensureAdminReadyForLogin()))return;
    const oldPw=prompt("현재 관리자 비밀번호를 입력하세요.");
    if(oldPw===null)return;
    if(await sha256(oldPw.trim())!==adminPasswordHash){alert("현재 관리자 비밀번호가 맞지 않습니다.");return;}
    const next=prompt("새 관리자 비밀번호를 입력하세요.");
    if(next===null)return;
    if(!next.trim()){alert("새 비밀번호가 비어 있습니다.");return;}
    const again=prompt("새 관리자 비밀번호를 다시 입력하세요.");
    if(again===null)return;
    if(next.trim()!==again.trim()){alert("새 비밀번호가 서로 다릅니다.");return;}
    adminPasswordHash=await sha256(next.trim());
    writeAdminSync("admin-password-change");
    alert("관리자 비밀번호가 변경되었고 Firebase에 실시간 동기화되었습니다.");
  }
  async function changeReadOnlyPassword(){
    if(!(await ensureAdminReadyForLogin()))return;
    const adminPw=prompt("관리자 비밀번호를 입력하세요.");
    if(adminPw===null)return;
    if(await sha256(adminPw.trim())!==adminPasswordHash){alert("관리자 비밀번호가 맞지 않습니다.");return;}
    const next=prompt("새 읽기전용 비밀번호를 입력하세요.");
    if(next===null)return;
    if(!next.trim()){alert("새 읽기전용 비밀번호가 비어 있습니다.");return;}
    const again=prompt("새 읽기전용 비밀번호를 다시 입력하세요.");
    if(again===null)return;
    if(next.trim()!==again.trim()){alert("읽기전용 비밀번호가 서로 다릅니다.");return;}
    readOnlyPasswordHash=await sha256(next.trim());
    writeAdminSync("readonly-password-change");
    alert("읽기전용 비밀번호가 변경되었고 Firebase에 실시간 동기화되었습니다.");
  }
  async function createRecoveryCode(){
    if(!(await ensureAdminReadyForLogin()))return;
    const code=makeRecoveryCode();
    adminRecoveryHash=await sha256(code);
    writeAdminSync("recovery-code-create");
    alert("복구코드가 생성되었고 Firebase에 동기화되었습니다.\n\n"+code+"\n\n이 코드는 지금만 확인 가능합니다. 반드시 따로 보관하세요.");
  }
  async function resetPassword(){
    if(!(await ensureAdminReadyForLogin()))return;
    const code=prompt("복구코드를 입력하세요.");
    if(code===null)return;
    if(!adminRecoveryHash){alert("생성된 복구코드가 없습니다. 관리자 로그인 후 복구코드를 먼저 생성하세요.");return;}
    if(await sha256(code.trim().toUpperCase())!==adminRecoveryHash){alert("복구코드가 맞지 않습니다.");return;}
    adminPasswordHash=await sha256(DEFAULT_PASSWORD);
    adminRecoveryHash="";
    writeAdminSync("password-reset");
    alert("관리자 비밀번호가 1234로 초기화되었고 Firebase에 실시간 동기화되었습니다.\n읽기전용 기본 비밀번호는 0000입니다.");
  }
  function closeAllToolbarGroups(){
    ["adminButtonGroup","editButtonGroup"].forEach(id=>{const panel=$(id); if(panel)panel.setAttribute("hidden","");});
    ["adminGroupToggleBtn","editGroupToggleBtn"].forEach(id=>{const btn=$(id); if(btn){btn.classList.remove("is-open");btn.setAttribute("aria-expanded","false");}});
  }

  async function openAdminGroupWithPassword(){
    if(!(await ensureAdminReadyForLogin()))return;
    const pw=prompt("시스템관리자 비밀번호를 입력하세요.");
    if(pw===null)return;
    if(await sha256(pw.trim())!==systemAdminPasswordHash){
      alert("시스템관리자 비밀번호가 맞지 않습니다.");
      return;
    }
    closeAllToolbarGroups();
    const panel=$("adminButtonGroup");
    const btn=$("adminGroupToggleBtn");
    if(panel)panel.removeAttribute("hidden");
    if(btn){btn.classList.add("is-open");btn.setAttribute("aria-expanded","true");}
  }

  async function changeSystemAdminPassword(){
    if(!(await ensureAdminReadyForLogin()))return;
    const oldPw=prompt("현재 시스템관리자 비밀번호를 입력하세요.");
    if(oldPw===null)return;
    if(await sha256(oldPw.trim())!==systemAdminPasswordHash){alert("현재 시스템관리자 비밀번호가 맞지 않습니다.");return;}
    const next=prompt("새 시스템관리자 비밀번호를 입력하세요.");
    if(next===null)return;
    if(!next.trim()){alert("새 시스템관리자 비밀번호가 비어 있습니다.");return;}
    const again=prompt("새 시스템관리자 비밀번호를 다시 입력하세요.");
    if(again===null)return;
    if(next.trim()!==again.trim()){alert("시스템관리자 비밀번호가 서로 다릅니다.");return;}
    systemAdminPasswordHash=await sha256(next.trim());
    writeAdminSync("system-admin-password-change");
    alert("시스템관리자 비밀번호가 변경되었고 Firebase에 실시간 동기화되었습니다.");
  }

  window.openAdminGroupWithPassword=openAdminGroupWithPassword;
  window.addEventListener("request-admin-group-open",openAdminGroupWithPassword);

  function bindAdmin(){
    let hasSavedSession=false;
    try{hasSavedSession=localStorage.getItem(SESSION_KEY)==="1";}catch(e){}
    if(!hasSavedSession){
      setViewportLockedForAdmin(true);
      document.body.classList.add("locked");
      document.body.classList.remove("unlocked","readonly-mode","edit-mode");
      document.documentElement.classList.remove("member-refresh-unlocked","member-refresh-readonly");
    }
    const loginBtn=$("adminLoginBtn");
    const readOnlyLoginBtn=$("readOnlyLoginBtn");
    const input=$("adminPasswordInput");
    const logoutBtn=$("adminLogoutBtn");
    const changeBtn=$("adminChangePasswordBtn");
    const readOnlyChangeBtn=$("readOnlyChangePasswordBtn");
    const recoveryBtn=$("adminRecoveryCodeBtn");
    const systemChangeBtn=$("systemAdminChangePasswordBtn");
    const resetBtn=$("adminResetPasswordBtn");
    if(loginBtn)loginBtn.onclick=unlockWithPassword;
    if(readOnlyLoginBtn)readOnlyLoginBtn.onclick=unlockReadOnlyWithPassword;
    if(input){
      input.placeholder="비밀번호 입력";
      input.addEventListener("keydown",(e)=>{if(e.key==="Enter")unlockWithPassword();});
      setTimeout(()=>input.focus(),80);
    }
    if(logoutBtn)logoutBtn.onclick=logout;
    if(changeBtn)changeBtn.onclick=changePassword;
    if(readOnlyChangeBtn)readOnlyChangeBtn.onclick=changeReadOnlyPassword;
    if(recoveryBtn)recoveryBtn.onclick=createRecoveryCode;
    if(systemChangeBtn)systemChangeBtn.onclick=changeSystemAdminPassword;
    if(resetBtn)resetBtn.onclick=resetPassword;

    /* PC/모바일 새로고침 방지: pagehide/beforeunload/visibilitychange에서 로그인 상태를 삭제하지 않습니다.
       로그아웃 버튼을 누를 때만 저장된 화면 상태를 삭제합니다. */

    initAdminFirebaseSync();
    restoreUnlockedSession();
  }
  if(document.readyState==="loading")document.addEventListener("DOMContentLoaded",bindAdmin);
  else bindAdmin();
})();
</script>

<script>
/* 관리자 모드: 읽기전용 로그인에서 보일 열을 설정 */
(function(){
  const CONFIG_KEY = "memberList.readonly.visibleColumns.v1";
  const DEFAULT_VISIBLE = [0, 1, 2, 5, 11, 12]; // 직책/이름/성별/연락처/닉네임/버스타는곳
  let lastSignature = "";

  function getTable(){ return document.getElementById("memberTable"); }
  function getHeaders(){
    const table = getTable();
    const first = table && table.rows && table.rows[0];
    if(!first) return [];
    return Array.from(first.cells).map((cell, idx)=>{
      const title = cell.dataset.headerTitle || cell.querySelector(".header-title")?.innerText || cell.innerText || ("열" + (idx + 1));
      return String(title).replace(/\s+/g," ").trim() || ("열" + (idx + 1));
    });
  }
  function readConfig(){
    try{
      const raw = localStorage.getItem(CONFIG_KEY);
      const arr = raw ? JSON.parse(raw) : DEFAULT_VISIBLE;
      if(Array.isArray(arr) && arr.length) return arr.map(Number).filter(n=>Number.isInteger(n) && n >= 0);
    }catch(e){}
    return DEFAULT_VISIBLE.slice();
  }
  function saveConfig(arr){
    const clean = Array.from(new Set(arr.map(Number).filter(n=>Number.isInteger(n) && n >= 0))).sort((a,b)=>a-b);
    localStorage.setItem(CONFIG_KEY, JSON.stringify(clean.length ? clean : DEFAULT_VISIBLE));
    applyReadonlyColumnVisibility(true);
  }
  function applyReadonlyColumnVisibility(force=false){
    const table = getTable();
    if(!table) return;
    const headers = getHeaders();
    const visible = new Set(readConfig());
    const signature = headers.length + "|" + Array.from(visible).join(",") + "|" + table.rows.length;
    if(!force && signature === lastSignature) return;
    lastSignature = signature;

    Array.from(table.querySelectorAll("col")).forEach((col, idx)=>{
      col.classList.toggle("readonly-hidden-column", !visible.has(idx));
    });
    Array.from(table.rows).forEach(row=>{
      Array.from(row.cells).forEach((cell, idx)=>{
        cell.classList.toggle("readonly-hidden-column", !visible.has(idx));
      });
    });
  }
  function closeModal(){
    const old = document.getElementById("readonlyColumnModalBackdrop");
    if(old) old.remove();
  }
  function showModal(){
    applyReadonlyColumnVisibility(true);
    const headers = getHeaders();
    if(!headers.length){ alert("표가 아직 준비되지 않았습니다."); return; }
    closeModal();
    const visible = new Set(readConfig());
    const backdrop = document.createElement("div");
    backdrop.id = "readonlyColumnModalBackdrop";
    backdrop.className = "readonly-column-modal-backdrop";
    backdrop.innerHTML = `
      <div class="readonly-column-modal" role="dialog" aria-modal="true">
        <h2>읽기전용 열 보기/숨김 설정</h2>
        <p class="readonly-column-desc">체크한 열만 읽기전용 로그인 화면에서 보입니다.<br>관리자/편집 로그인에서는 모든 열이 그대로 보입니다.</p>
        <div class="readonly-column-list"></div>
        <div class="readonly-column-actions">
          <button type="button" class="all">전체보기</button>
          <button type="button" class="default">기본값</button>
          <button type="button" class="cancel">취소</button>
          <button type="button" class="save">저장</button>
        </div>
      </div>`;
    const list = backdrop.querySelector(".readonly-column-list");
    headers.forEach((name, idx)=>{
      const label = document.createElement("label");
      label.className = "readonly-column-item";
      label.innerHTML = `<input type="checkbox" value="${idx}"> <span>${idx + 1}. ${name}</span>`;
      const input = label.querySelector("input");
      input.checked = visible.has(idx);
      list.appendChild(label);
    });
    backdrop.addEventListener("click", e=>{ if(e.target === backdrop) closeModal(); });
    backdrop.querySelector(".cancel").onclick = closeModal;
    backdrop.querySelector(".all").onclick = ()=>{ list.querySelectorAll("input").forEach(input=>input.checked = true); };
    backdrop.querySelector(".default").onclick = ()=>{ list.querySelectorAll("input").forEach(input=>input.checked = DEFAULT_VISIBLE.includes(Number(input.value))); };
    backdrop.querySelector(".save").onclick = ()=>{
      const selected = Array.from(list.querySelectorAll("input:checked")).map(input=>Number(input.value));
      if(!selected.length){ alert("읽기전용에서 최소 1개 열은 보여야 합니다."); return; }
      saveConfig(selected);
      closeModal();
      alert("읽기전용 열 보기/숨김 설정을 저장했습니다.");
    };
    document.body.appendChild(backdrop);
  }
  function bindButton(){
    const btn = document.getElementById("readOnlyColumnSettingBtn");
    if(btn && !btn.dataset.boundReadonlyColumn){
      btn.dataset.boundReadonlyColumn = "1";
      btn.addEventListener("click", showModal);
    }
  }
  window.applyReadonlyColumnVisibility = applyReadonlyColumnVisibility;
  document.addEventListener("DOMContentLoaded", ()=>{
    bindButton();
    applyReadonlyColumnVisibility(true);
    const table = getTable();
    if(table){
      new MutationObserver(()=>applyReadonlyColumnVisibility()).observe(table,{childList:true,subtree:true});
    }
  });
  if(document.readyState !== "loading"){
    bindButton();
    setTimeout(()=>applyReadonlyColumnVisibility(true), 0);
    const table = getTable();
    if(table){ new MutationObserver(()=>applyReadonlyColumnVisibility()).observe(table,{childList:true,subtree:true}); }
  }
})();
</script>


<script>
(function(){
  const PHONE_COLS = [5, 6]; // 연락처, 비상연락처
  const LONG_PRESS_MS = 1500;
  const MOVE_CANCEL_PX = 12;

  let holdTimer = null;
  let activeCell = null;
  let startX = 0;
  let startY = 0;
  let activePointerId = null;
  let suppressClickUntil = 0;

  function cleanPhone(text){
    return String(text || "").replace(/[^0-9]/g, "");
  }

  function showToast(message){
    const old = document.getElementById("phoneHoldToast");
    if(old) old.remove();
    const toast = document.createElement("div");
    toast.id = "phoneHoldToast";
    toast.className = "phone-hold-toast";
    toast.textContent = message;
    document.body.appendChild(toast);
    clearTimeout(window.__phoneHoldToastTimer);
    window.__phoneHoldToastTimer = setTimeout(()=>toast.remove(), 1200);
  }

  function getPhoneCell(target){
    const cell = target && target.closest ? target.closest("td.phone-hold-cell") : null;
    const table = document.getElementById("memberTable");
    if(!cell || !table || !table.contains(cell)) return null;
    return cell;
  }

  function markPhoneCells(){
    const table = document.getElementById("memberTable");
    if(!table || !table.tBodies || !table.tBodies[0]) return;
    Array.from(table.tBodies[0].rows).forEach((row, rowIndex)=>{
      if(rowIndex === 0) return;
      PHONE_COLS.forEach((colIndex)=>{
        const cell = row.cells[colIndex];
        if(!cell) return;
        const phone = cleanPhone(cell.innerText);
        if(phone.length < 9){
          cell.classList.remove("phone-hold-cell");
          delete cell.dataset.phoneNumber;
          return;
        }
        cell.classList.add("phone-hold-cell");
        cell.dataset.phoneNumber = phone;
        cell.style.fontWeight = "400";
        if(!cell.classList.contains("cell-editing") && !cell.classList.contains("phone-hold-editing")){
          cell.contentEditable = "false";
        }
      });
    });
  }

  function setCaretToEndSafe(cell){
    try{
      const range = document.createRange();
      range.selectNodeContents(cell);
      range.collapse(false);
      const sel = window.getSelection();
      sel.removeAllRanges();
      sel.addRange(range);
    }catch(error){}
  }

  function enablePhoneEdit(cell){
    if(!cell) return;
    try{ if(typeof window.lockAllCellEditing === "function") window.lockAllCellEditing(cell); }catch(error){}
    cell.contentEditable = "true";
    cell.classList.add("cell-editing", "selected-cell", "phone-hold-editing");
    cell.style.fontWeight = "400";

    // 기존 표 선택 로직(selectedCell)과 동기화해야 내용복사/붙여넣기 버튼도 바로 작동함
    try{
      cell.dispatchEvent(new MouseEvent("click", {bubbles:true, cancelable:true, view:window}));
    }catch(error){}

    cell.focus();
    setCaretToEndSafe(cell);
    showToast("편집/복사/붙여넣기 가능");
  }

  function closePhoneDropdown(){
    const old = document.getElementById("phoneDropdownMenu");
    if(old) old.remove();
  }

  function clamp(v, min, max){
    if(max < min) return min;
    return Math.max(min, Math.min(max, v));
  }

  function positionDropdown(menu, cell){
    const rect = cell.getBoundingClientRect();
    const scrollX = window.scrollX || document.documentElement.scrollLeft || 0;
    const scrollY = window.scrollY || document.documentElement.scrollTop || 0;
    const vw = window.innerWidth || document.documentElement.clientWidth || 320;
    const vh = window.innerHeight || document.documentElement.clientHeight || 480;

    menu.style.left = "0px";
    menu.style.top = "0px";
    document.body.appendChild(menu);

    const mw = menu.offsetWidth || 92;
    const mh = menu.offsetHeight || 86;
    let left = scrollX + rect.left + (rect.width / 2) - (mw / 2);
    let top = scrollY + rect.bottom + 2;

    if(rect.bottom + mh + 8 > vh){
      top = scrollY + rect.top - mh - 2;
    }
    left = clamp(left, scrollX + 4, scrollX + vw - mw - 4);
    top = clamp(top, scrollY + 4, scrollY + vh - mh - 4);

    menu.style.left = left + "px";
    menu.style.top = top + "px";
  }

  function escapeHtml(value){
    return String(value || "").replace(/[&<>"']/g, function(ch){
      return {"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#39;"}[ch] || ch;
    });
  }

  function getRowName(cell){
    try{
      const row = cell && cell.parentElement;
      const nameCell = row && row.cells ? row.cells[1] : null;
      const name = String(nameCell ? nameCell.innerText : "").trim();
      return name || "이름 없음";
    }catch(error){
      return "이름 없음";
    }
  }

  function openPhoneDropdown(cell){
    const phone = cell ? (cell.dataset.phoneNumber || cleanPhone(cell.innerText)) : "";
    if(phone.length < 9){
      showToast("전화번호 확인 필요");
      return;
    }

    closePhoneDropdown();
    suppressClickUntil = Date.now() + 900;

    const menu = document.createElement("div");
    menu.id = "phoneDropdownMenu";
    menu.className = "phone-dropdown-menu";
    menu.setAttribute("role", "menu");
    const rowName = getRowName(cell);
    menu.innerHTML = `
      <div class="phone-dropdown-name" title="${escapeHtml(rowName)}">${escapeHtml(rowName)}</div>
      <button type="button" class="edit" data-action="edit">✏️ 편집</button>
      <button type="button" class="call" data-action="call">📞 전화</button>
      <button type="button" class="sms" data-action="sms">💬 문자</button>`;

    menu.addEventListener("click", function(e){
      const btn = e.target && e.target.closest ? e.target.closest("button[data-action]") : null;
      if(!btn) return;
      e.preventDefault();
      e.stopPropagation();
      const action = btn.dataset.action;
      closePhoneDropdown();
      if(action === "edit") enablePhoneEdit(cell);
      if(action === "call") window.location.href = "tel:" + phone;
      if(action === "sms") window.location.href = "sms:" + phone;
    }, true);

    menu.addEventListener("contextmenu", (e)=>e.preventDefault(), true);
    positionDropdown(menu, cell);
  }

  function clearHoldTimer(){
    clearTimeout(holdTimer);
    holdTimer = null;
  }

  function cancelHold(){
    clearHoldTimer();
    activeCell = null;
    activePointerId = null;
  }

  function isMultiTouch(e){
    return !!(e && e.touches && e.touches.length > 1);
  }

  function getPoint(e){
    return e.touches && e.touches[0] ? e.touches[0] : e;
  }

  function startHold(e){
    if(isMultiTouch(e)){
      cancelHold();
      return;
    }
    const cell = getPhoneCell(e.target);
    if(!cell) return;
    if(cell.classList.contains("phone-hold-editing") || cell.classList.contains("cell-editing") || cell.isContentEditable){
      return; // 더블클릭으로 편집 중일 때는 커서 이동/복사/붙여넣기 기본 동작 허용
    }

    e.stopPropagation();
    if(e.stopImmediatePropagation) e.stopImmediatePropagation();

    const p = getPoint(e);
    startX = p.clientX || 0;
    startY = p.clientY || 0;
    activeCell = cell;
    activePointerId = e.pointerId != null ? e.pointerId : null;
    clearHoldTimer();

    holdTimer = setTimeout(()=>{
      if(!activeCell) return;
      openPhoneDropdown(activeCell);
      cancelHold();
    }, LONG_PRESS_MS);
  }

  function moveHold(e){
    if(!activeCell) return;
    if(isMultiTouch(e)){
      cancelHold();
      return;
    }
    if(activePointerId != null && e.pointerId != null && e.pointerId !== activePointerId) return;
    const p = getPoint(e);
    const dx = Math.abs((p.clientX || 0) - startX);
    const dy = Math.abs((p.clientY || 0) - startY);
    if(dx > MOVE_CANCEL_PX || dy > MOVE_CANCEL_PX){
      cancelHold();
    }
  }

  function endHold(e){
    const hadCell = !!activeCell;
    cancelHold();
    if(hadCell && Date.now() < suppressClickUntil && e){
      e.preventDefault();
      e.stopPropagation();
      if(e.stopImmediatePropagation) e.stopImmediatePropagation();
    }
  }

  function blockPhoneDefaults(e){
    const cell = getPhoneCell(e.target);
    if(!cell) return;
    if(cell.classList.contains("phone-hold-editing") || cell.classList.contains("cell-editing") || cell.isContentEditable){
      return; // 편집 상태에서는 텍스트 선택/복사/붙여넣기 허용
    }
    e.preventDefault();
    e.stopPropagation();
    if(e.stopImmediatePropagation) e.stopImmediatePropagation();
  }

  function bindPhoneHold(){
    markPhoneCells();
    if(document.body.dataset.phoneHoldEditCallBind === "3") return;
    document.body.dataset.phoneHoldEditCallBind = "3";

    document.addEventListener("contextmenu", blockPhoneDefaults, true);
    document.addEventListener("selectstart", blockPhoneDefaults, true);
    document.addEventListener("dragstart", blockPhoneDefaults, true);

    if(window.PointerEvent){
      document.addEventListener("pointerdown", startHold, true);
      document.addEventListener("pointermove", moveHold, true);
      document.addEventListener("pointerup", endHold, true);
      document.addEventListener("pointercancel", endHold, true);
    }else{
      document.addEventListener("touchstart", startHold, {capture:true, passive:true});
      document.addEventListener("touchmove", moveHold, {capture:true, passive:true});
      document.addEventListener("touchend", endHold, true);
      document.addEventListener("touchcancel", endHold, true);
      document.addEventListener("mousedown", startHold, true);
      document.addEventListener("mousemove", moveHold, true);
      document.addEventListener("mouseup", endHold, true);
    }

    document.addEventListener("dblclick", function(e){
      const cell = getPhoneCell(e.target);
      if(!cell) return;
      e.preventDefault();
      e.stopPropagation();
      if(e.stopImmediatePropagation) e.stopImmediatePropagation();
      clearHoldTimer();
      closePhoneDropdown();
      enablePhoneEdit(cell);
    }, true);

    document.addEventListener("click", function(e){
      const menu = document.getElementById("phoneDropdownMenu");
      if(menu && !menu.contains(e.target) && !getPhoneCell(e.target)) closePhoneDropdown();
      if(Date.now() < suppressClickUntil && getPhoneCell(e.target)) blockPhoneDefaults(e);
    }, true);

    document.addEventListener("scroll", closePhoneDropdown, true);
    window.addEventListener("resize", closePhoneDropdown, true);

    document.addEventListener("input", function(e){
      const cell = getPhoneCell(e.target);
      if(cell){
        cell.dataset.phoneNumber = cleanPhone(cell.innerText);
        cell.style.fontWeight = "400";
      }
    }, true);
    document.addEventListener("blur", function(e){
      const cell = e.target && e.target.closest ? e.target.closest("td.phone-hold-cell") : null;
      if(cell){
        cell.classList.remove("phone-hold-editing");
        cell.dataset.phoneNumber = cleanPhone(cell.innerText);
        cell.style.fontWeight = "400";
      }
    }, true);
  }

  document.addEventListener("DOMContentLoaded", function(){
    setTimeout(bindPhoneHold, 300);
    setTimeout(markPhoneCells, 1000);
    setTimeout(markPhoneCells, 2500);
    const observer = new MutationObserver(function(){
      clearTimeout(window.__phoneHoldMarkTimer);
      window.__phoneHoldMarkTimer = setTimeout(markPhoneCells, 150);
    });
    observer.observe(document.body, {childList:true, subtree:true, characterData:true});
  });
})();
</script>
